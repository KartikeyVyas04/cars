<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELOCITY | Diecast Series 001-010</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root {
            --bg: #0a0a0a;
            --text: #efefef;
            --accent: #473DFE;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: var(--sans); 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased; 
        }

        /* Fixed Background Elements */
        #webgl-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .overlay-vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            z-index: 100;
            font-family: var(--mono);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        /* Content Sections */
        .content {
            position: relative;
            z-index: 10;
        }

        section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 10vw;
        }

        .hero {
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
        }

        .hero h1 {
            font-size: clamp(4rem, 15vw, 15rem);
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -0.06em;
            text-transform: uppercase;
        }

        /* Car Section Styling */
        .car-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5rem;
        }

        .car-info {
            max-width: 450px;
        }

        .car-number {
            font-family: var(--mono);
            color: var(--accent);
            font-size: 1.2rem;
            margin-bottom: 1rem;
            display: block;
        }

        .car-title {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .car-meta {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 2rem;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            font-family: var(--mono);
            font-size: 0.8rem;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            text-transform: uppercase;
            color: #888;
        }

        .meta-row span:last-child {
            color: var(--text);
        }

        .cta-footer {
            height: 50vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .buy-btn {
            background: var(--text);
            color: var(--bg);
            padding: 1.5rem 4rem;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            transition: all 0.3s ease;
        }

        .buy-btn:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.05);
        }

        /* High-speed scroll progress */
        #progress-bar {
            position: fixed;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            height: 200px;
            width: 2px;
            background: rgba(255,255,255,0.1);
            z-index: 100;
        }

        #progress-inner {
            width: 100%;
            height: 0%;
            background: var(--accent);
        }

        @media (max-width: 900px) {
            .car-section { grid-template-columns: 1fr; }
            nav { padding: 1rem; }
            .hero h1 { font-size: 20vw; }
        }
    </style>
</head>
<body>

    <nav>
        <div>Brand Lab &copy; 2026</div>
        <div>System: Series_01-10</div>
        <div id="active-id">ID: 000</div>
    </nav>

    <div id="progress-bar"><div id="progress-inner"></div></div>
    <div id="webgl-container"></div>
    <div class="overlay-vignette"></div>

    <main class="content">
        <section class="hero">
            <span style="font-family: var(--mono); color: var(--accent);">LAB_RELEASE_V1.0</span>
            <h1>CRAFT<br><span style="color: transparent; -webkit-text-stroke: 1px #fff;">PERFECT</span></h1>
            <p style="font-family: var(--mono); margin-top: 2rem; opacity: 0.5;">SCROLL TO EXPLORE THE REGISTRY</p>
        </section>

        <!-- CAR SECTIONS WILL BE INJECTED HERE BY JS -->
        <div id="catalog"></div>

        <section class="cta-footer">
            <div>
                <h2 style="font-size: 3rem; margin-bottom: 2rem;">JOIN THE LAB.</h2>
                <a href="#" class="buy-btn">Inquire for Collection</a>
            </div>
        </section>
    </main>

    <script>
        // --- 1. DATA: THE 10 CARS ---
        const carData = [
            { id: "001", name: "Aero-Striker", price: "$145", scale: "1:18", color: "#473DFE", parts: "142" },
            { id: "002", name: "Night-Crawler", price: "$120", scale: "1:18", color: "#FE3D3D", parts: "98" },
            { id: "003", name: "Ghost-Prowler", price: "$180", scale: "1:12", color: "#00FF88", parts: "210" },
            { id: "004", name: "Apex-Zero", price: "$95", scale: "1:24", color: "#FFD700", parts: "85" },
            { id: "005", name: "Volt-Runner", price: "$130", scale: "1:18", color: "#00E5FF", parts: "120" },
            { id: "006", name: "Iron-Core", price: "$160", scale: "1:18", color: "#FF00FF", parts: "155" },
            { id: "007", name: "Zenith-GT", price: "$210", scale: "1:12", color: "#FFFFFF", parts: "305" },
            { id: "008", name: "Neon-Pulse", price: "$110", scale: "1:24", color: "#8844FF", parts: "92" },
            { id: "009", name: "Vortex-M", price: "$140", scale: "1:18", color: "#FFAA00", parts: "118" },
            { id: "010", name: "Shadow-Spec", price: "$195", scale: "1:18", color: "#555555", parts: "190" }
        ];

        // --- 2. DYNAMIC UI INJECTION ---
        const catalog = document.getElementById('catalog');
        carData.forEach(car => {
            const section = document.createElement('section');
            section.className = 'car-section';
            section.id = `section-${car.id}`;
            section.innerHTML = `
                <div></div> <!-- Spacer for 3D View -->
                <div class="car-info">
                    <span class="car-number">ID_${car.id}</span>
                    <h2 class="car-title">${car.name}</h2>
                    <div class="car-meta">
                        <div class="meta-row"><span>Unit Price</span><span>${car.price}</span></div>
                        <div class="meta-row"><span>Technical Scale</span><span>${car.scale}</span></div>
                        <div class="meta-row"><span>Component Count</span><span>${car.parts}</span></div>
                        <div class="meta-row"><span>Edition</span><span>Lab Limited</span></div>
                    </div>
                </div>
            `;
            catalog.appendChild(section);
        });

        // --- 3. THREE.JS SCENE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.3));

        // Create a Technical Car Placeholder (Wireframe Box + Details)
        const carGroup = new THREE.Group();
        const mainBodyGeo = new THREE.BoxGeometry(4, 0.6, 2);
        const wireframeMat = new THREE.MeshBasicMaterial({ color: 0x473DFE, wireframe: true, transparent: true, opacity: 0.5 });
        const mainBody = new THREE.Mesh(mainBodyGeo, wireframeMat);
        carGroup.add(mainBody);

        // Add 4 Procedural Wheels
        const wheelGeo = new THREE.SphereGeometry(0.4, 8, 8);
        const wheels = [];
        [[-1.5,-0.3,1], [1.5,-0.3,1], [-1.5,-0.3,-1], [1.5,-0.3,-1]].forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, wireframeMat);
            wheel.position.set(...pos);
            carGroup.add(wheel);
            wheels.push(wheel);
        });
        scene.add(carGroup);

        // --- 4. GSAP ANIMATIONS ---
        gsap.registerPlugin(ScrollTrigger);

        // Hero Parallax
        gsap.to(carGroup.position, {
            x: 2, z: 2, rotationY: Math.PI,
            scrollTrigger: { trigger: ".hero", start: "top top", end: "bottom top", scrub: true }
        });

        // Loop through each car section to animate the 3D model
        carData.forEach((car, i) => {
            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: `#section-${car.id}`,
                    start: "top bottom",
                    end: "top center",
                    scrub: 1,
                    onEnter: () => {
                        mainBody.material.color.set(car.color);
                        document.getElementById('active-id').innerText = `ID: ${car.id}`;
                    },
                    onEnterBack: () => {
                        mainBody.material.color.set(car.color);
                        document.getElementById('active-id').innerText = `ID: ${car.id}`;
                    }
                }
            });

            // Camera movement per car
            tl.to(carGroup.rotation, { y: i * (Math.PI / 2), x: Math.random() * 0.5 });
            tl.to(carGroup.position, { x: -3, duration: 1 }, 0);
        });

        // Progress Bar & Scroll Animation
        gsap.to("#progress-inner", {
            height: "100%",
            scrollTrigger: { scrub: 0.2 }
        });

        // Background loop
        function animate() {
            requestAnimationFrame(animate);
            carGroup.rotation.z += 0.001;
            wheels.forEach(w => w.rotation.x += 0.01);
            renderer.render(scene, camera);
        }
        animate();

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
