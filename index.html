<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR006 | Lab Architecture</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>

    <style>
        :root {
            --bg-dark: #050000;
            --bg-red: #3a0005;
            --text: #f5f5f5;
            --accent: #ff2a2a;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text); 
            font-family: var(--sans); 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased; 
        }

        /* --- BACKGROUND LAYER --- */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 50%, var(--bg-red) 0%, var(--bg-dark) 70%);
            z-index: 0;
        }

        /* Tech Grid overlay */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 4vw 4vw;
            z-index: 1;
            pointer-events: none;
        }

        /* --- 3D CANVAS LAYER --- */
        #webgl-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2; /* Sits exactly between background and content */
            pointer-events: none;
        }

        /* --- CONTENT LAYER --- */
        .content { 
            position: relative; 
            z-index: 10; 
        }

        /* Custom Cursor */
        .cursor-dot {
            position: fixed; width: 6px; height: 6px; background: white;
            border-radius: 50%; z-index: 9999; pointer-events: none; transform: translate(-50%, -50%);
        }
        .cursor-ring {
            position: fixed; width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.5);
            border-radius: 50%; z-index: 9999; pointer-events: none; transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, border-color 0.3s, background 0.3s;
        }
        .cursor-ring.active {
            width: 70px; height: 70px; border-color: var(--accent); background: rgba(255, 42, 42, 0.1);
        }

        nav {
            position: fixed; top: 0; width: 100%; padding: 2rem 4vw;
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            z-index: 100; font-family: var(--mono); font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 0.15em; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(5, 0, 0, 0.5); backdrop-filter: blur(10px);
        }
        nav .nav-center { text-align: center; color: var(--accent); font-weight: 600; }
        nav .nav-right { text-align: right; }

        .hero {
            height: 100vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center;
        }
        .hero h1 {
            font-size: clamp(4rem, 14vw, 14rem); font-weight: 900; line-height: 0.85;
            letter-spacing: -0.05em; text-transform: uppercase; margin-top: 1rem;
        }
        .hero .outline-text { color: transparent; -webkit-text-stroke: 1px rgba(255, 255, 255, 0.8); }

        /* --- STRICT GRID LAYOUT TO PREVENT OVERLAP --- */
        .catalog {
            width: 100%;
            max-width: 1800px;
            margin: 0 auto;
            padding: 5vh 4vw;
            display: flex;
            flex-direction: column;
            gap: 15vh; /* Massive spacing for smooth scroll feeling */
        }

        .category-section {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Strict 50/50 split */
            gap: 4vw;
            align-items: center;
            min-height: 90vh;
            width: 100%;
        }

        /* Force cards into their respective columns */
        .category-section:nth-child(odd) .card-wrapper { grid-column: 1; justify-self: start; }
        .category-section:nth-child(even) .card-wrapper { grid-column: 2; justify-self: end; }

        .card-wrapper {
            width: 100%;
            max-width: 550px;
            perspective: 1200px;
        }

        .category-card {
            padding: 3.5rem;
            background: rgba(5, 0, 0, 0.7);
            border: 1px solid rgba(255, 42, 42, 0.2);
            backdrop-filter: blur(16px);
            transform-style: preserve-3d;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            will-change: transform;
        }

        .category-section:nth-child(odd) .category-card { border-left: 3px solid var(--accent); }
        .category-section:nth-child(even) .category-card { border-right: 3px solid var(--accent); text-align: right; }

        /* Inner Parallax */
        .category-card > * { transform: translateZ(30px); }

        .category-id {
            font-family: var(--mono); color: var(--accent); font-size: 0.9rem;
            font-weight: 600; margin-bottom: 1rem; display: block; letter-spacing: 0.1em;
        }

        .category-title {
            font-size: clamp(2rem, 4vw, 4rem); font-weight: 800; letter-spacing: -0.04em;
            line-height: 1; margin-bottom: 1.5rem; text-transform: uppercase;
        }
        
        .category-desc {
            font-size: 1.1rem; line-height: 1.6; color: #aaa; margin-bottom: 2.5rem;
        }

        .explore-btn {
            display: inline-flex; align-items: center; gap: 1rem; background: transparent;
            color: var(--text); padding: 1rem 0; text-decoration: none; font-family: var(--mono);
            font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em;
            border-bottom: 1px solid var(--accent); transition: all 0.3s ease;
        }
        .explore-btn:hover { gap: 1.5rem; color: var(--accent); }

        .cta-footer {
            height: 100vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; border-top: 1px solid rgba(255, 42, 42, 0.2);
            background: radial-gradient(circle at top, rgba(100, 0, 5, 0.8) 0%, var(--bg-dark) 70%);
            position: relative; z-index: 20;
        }

        #progress-bar {
            position: fixed; right: 2rem; top: 50%; transform: translateY(-50%);
            height: 30vh; width: 1px; background: rgba(255, 255, 255, 0.15); z-index: 100;
        }
        #progress-inner {
            width: 3px; height: 0%; background: var(--accent); transform: translateX(-1px);
        }

        @media (max-width: 1024px) {
            .category-section { grid-template-columns: 1fr; align-items: end; padding-bottom: 10vh; }
            .category-section:nth-child(odd) .card-wrapper, .category-section:nth-child(even) .card-wrapper { grid-column: 1; justify-self: center; }
            .category-section:nth-child(odd) .category-card, .category-section:nth-child(even) .category-card {
                text-align: center; border-left: none; border-right: none; border-top: 3px solid var(--accent);
            }
            .cursor-dot, .cursor-ring { display: none; }
            * { cursor: auto !important; }
            #progress-bar { display: none; }
            nav .nav-center { display: none; }
            nav { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>
    <div id="webgl-container"></div>

    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <nav>
        <div>Brand Lab &copy; 2026</div>
        <div class="nav-center">SYSTEM CATEGORIES</div>
        <div class="nav-right" id="active-id">AWAITING INPUT</div>
    </nav>

    <div id="progress-bar"><div id="progress-inner"></div></div>

    <main class="content">
        <section class="hero">
            <div style="font-family: var(--mono); color: var(--accent); letter-spacing: 0.2em; font-size: 0.9rem;" class="hero-fade">SELECT ARCHITECTURE</div>
            <h1 class="hero-zoom">
                DIECAST<br>
                <span class="outline-text">FLEET</span>
            </h1>
        </section>

        <div class="catalog" id="catalog">
            <!-- Cards Injected via JS -->
        </div>

        <section class="cta-footer">
            <h2 class="hero-zoom" style="font-size: clamp(3rem, 10vw, 8rem); font-weight: 900; line-height: 1; text-transform: uppercase; letter-spacing: -0.04em;">VIEW FULL<br> REGISTRY</h2>
            <a href="#" class="explore-btn hover-target" style="margin-top: 3rem; border: 1px solid var(--accent); padding: 1.5rem 4rem;">Access Portal</a>
        </section>
    </main>

    <script>
        // --- 1. DATA CONFIGURATION ---
        const categoriesData = [
            { id: "01", title: "Hyper-Aero", desc: "Engineered for absolute zero drag. Wide wheelbases, slammed suspensions, and aggressive aerodynamics.", color: "#ff2a2a", geom: { l: 1.2, w: 1.1, s: 0.5, wh: 1 } },
            { id: "02", title: "Track-Spec", desc: "Built for the circuit. Featuring massive high-downforce rear wings, roll cages, and extreme camber setups.", color: "#473DFE", geom: { l: 1.0, w: 1.2, s: 1.4, wh: 1.1 } },
            { id: "03", title: "Street Drift", desc: "Underground aesthetics. Short wheelbases, widebody kits, and neon underglow cores.", color: "#FFD700", geom: { l: 0.85, w: 1.3, s: 0.8, wh: 1.2 } },
            { id: "04", title: "Halo Concept", desc: "The future of automotive design. Elongated chassis, conceptual wheel covers, and abstract geometry.", color: "#00E5FF", geom: { l: 1.5, w: 0.9, s: 0.3, wh: 0.8 } }
        ];

        // --- 2. GENERATE UI ---
        const catalog = document.getElementById('catalog');
        categoriesData.forEach((cat, index) => {
            const section = document.createElement('div');
            section.className = 'category-section';
            section.id = `section-${index}`;
            
            section.innerHTML = `
                <div class="card-wrapper">
                    <div class="category-card interactive-card">
                        <span class="category-id">SERIES // ${cat.id}</span>
                        <h2 class="category-title" style="color: ${cat.color}">${cat.title}</h2>
                        <p class="category-desc">${cat.desc}</p>
                        <a href="category-${cat.id}.html" class="explore-btn hover-target">Explore Series &rarr;</a>
                    </div>
                </div>
            `;
            catalog.appendChild(section);
        });

        // --- 3. CUSTOM CURSOR & CARD PARALLAX ---
        const dot = document.querySelector('.cursor-dot');
        const ring = document.querySelector('.cursor-ring');
        
        const xDotTo = gsap.quickTo(dot, "x", {duration: 0.1, ease: "power3"});
        const yDotTo = gsap.quickTo(dot, "y", {duration: 0.1, ease: "power3"});
        const xRingTo = gsap.quickTo(ring, "x", {duration: 0.3, ease: "power3"});
        const yRingTo = gsap.quickTo(ring, "y", {duration: 0.3, ease: "power3"});

        let mouseX = 0, mouseY = 0;
        let normX = 0, normY = 0;

        window.addEventListener("mousemove", (e) => {
            xDotTo(e.clientX); yDotTo(e.clientY);
            xRingTo(e.clientX); yRingTo(e.clientY);
            
            mouseX = e.clientX; mouseY = e.clientY;
            normX = (e.clientX / window.innerWidth) * 2 - 1;
            normY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        document.querySelectorAll('.hover-target').forEach(el => {
            el.addEventListener('mouseenter', () => ring.classList.add('active'));
            el.addEventListener('mouseleave', () => ring.classList.remove('active'));
        });

        document.querySelectorAll('.interactive-card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                gsap.to(card, {
                    rotateY: (x / (rect.width / 2)) * 12,
                    rotateX: (y / (rect.height / 2)) * -12,
                    duration: 0.5, ease: "power2.out"
                });
            });
            card.addEventListener('mouseleave', () => {
                gsap.to(card, { rotateY: 0, rotateX: 0, duration: 1, ease: "elastic.out(1, 0.3)" });
            });
            card.addEventListener('mouseenter', () => ring.classList.add('active'));
            card.addEventListener('mouseleave', () => ring.classList.remove('active'));
        });

        // --- 4. THREE.JS PROCEDURAL CAR ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050000, 0.03);

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 16);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        const mainLight = new THREE.PointLight(0xffffff, 2, 50);
        mainLight.position.set(5, 10, 5);
        scene.add(mainLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.3));

        const carRig = new THREE.Group(); 
        const carModel = new THREE.Group(); 
        carRig.add(carModel);
        scene.add(carRig);
        
        // Premium Materials
        const metalMat = new THREE.MeshPhysicalMaterial({ color: 0x0f0f0f, metalness: 0.9, roughness: 0.2, clearcoat: 1 });
        const glassMat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, transmission: 0.9, opacity: 1, metalness: 0.2, roughness: 0.1, ior: 1.5, thickness: 0.5 });
        const coreMat = new THREE.MeshBasicMaterial({ color: 0xff2a2a });

        // Geometry
        const chassis = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.5, 2.2), metalMat);
        const cabin = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.2, 2, 32).rotateZ(Math.PI / 2), glassMat);
        cabin.position.set(-0.2, 0.7, 0);
        const core = new THREE.Mesh(new THREE.BoxGeometry(2, 0.2, 1), coreMat);
        core.position.set(-0.2, 0.4, 0);
        const spoiler = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 2.2), metalMat);
        spoiler.position.set(2, 0.8, 0);

        carModel.add(chassis, cabin, core, spoiler);

        const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 32).rotateX(Math.PI / 2);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x020202, roughness: 0.9 });
        const wheels = [];
        const baseWheelPositions = [[-1.5, -0.2, 1.2], [1.5, -0.2, 1.2], [-1.5, -0.2, -1.2], [1.5, -0.2, -1.2]];
        
        baseWheelPositions.forEach(pos => {
            const w = new THREE.Mesh(wheelGeo, wheelMat);
            w.position.set(...pos);
            carModel.add(w);
            wheels.push(w);
        });

        // --- 5. FRUSTUM MATH (ZERO OVERLAP GUARANTEE) ---
        let vWidth, vHeight;
        function calculateViewport() {
            const vFov = camera.fov * Math.PI / 180;
            vHeight = 2 * Math.tan(vFov / 2) * camera.position.z;
            vWidth = vHeight * camera.aspect;
        }
        calculateViewport();

        // --- 6. GSAP SCROLL: "CAR BRINGING THE CARD" EFFECT ---
        gsap.registerPlugin(ScrollTrigger);

        // Intro
        gsap.fromTo(".hero-zoom", { scale: 1.2, opacity: 0 }, { scale: 1, opacity: 1, duration: 1.5, ease: "power3.out", delay: 0.2 });
        gsap.fromTo(".hero-fade", { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 1, delay: 0.8, ease: "power2.out" });

        gsap.to("#progress-inner", { height: "100%", ease: "none", scrollTrigger: { trigger: document.body, start: "top top", end: "bottom bottom", scrub: 0.1 }});

        // Hide car initially
        carRig.position.set(-20, 0, 0);
        let accumulatedRotation = 0;

        let mm = gsap.matchMedia();

        // DESKTOP LOGIC
        mm.add("(min-width: 1025px)", () => {
            categoriesData.forEach((cat, i) => {
                const section = document.getElementById(`section-${i}`);
                const cardWrap = section.querySelector('.card-wrapper');
                const isLeftCard = i % 2 === 0;

                // FRUSTUM MAGIC: Place car exactly in the center of the EMPTY half of the screen
                const targetCarX = isLeftCard ? (vWidth / 4) : -(vWidth / 4); 
                // Card slides in from the same side the car is driving towards
                const cardStartX = isLeftCard ? -100 : 100; 

                const tl = gsap.timeline({
                    scrollTrigger: {
                        trigger: section,
                        start: "top 90%", // Trigger early
                        end: "center center",
                        scrub: 1,
                        invalidateOnRefresh: true, // Recalculates vWidth dynamically on resize
                        onEnter: () => document.getElementById('active-id').innerText = `SERIES: ${cat.id}`,
                        onEnterBack: () => document.getElementById('active-id').innerText = `SERIES: ${cat.id}`
                    }
                });

                // Car drives completely across screen to its safe zone
                // Using a function ensures it recalculates properly on window resize
                tl.fromTo(carRig.position, 
                    { x: () => isLeftCard ? -vWidth : vWidth, z: -5 }, 
                    { x: () => targetCarX, z: 2, ease: "power1.inOut" }, 0
                );
                
                // Spin car dynamically (adds 180deg each time for S-Curve)
                accumulatedRotation += Math.PI;
                tl.to(carModel.rotation, { y: accumulatedRotation, ease: "power2.inOut" }, 0);

                // Morph Geometry
                tl.to(chassis.scale, { x: cat.geom.l, z: cat.geom.w }, 0);
                tl.to(cabin.scale, { x: cat.geom.l, z: cat.geom.w }, 0);
                tl.to(spoiler.scale, { x: cat.geom.w }, 0);
                tl.to(spoiler.position, { y: cat.geom.s, x: 2 * cat.geom.l }, 0);
                wheels.forEach((w, wIdx) => {
                    tl.to(w.scale, { x: cat.geom.wh, y: cat.geom.wh, z: cat.geom.wh }, 0);
                    tl.to(w.position, { x: baseWheelPositions[wIdx][0] * cat.geom.l, z: baseWheelPositions[wIdx][2] * cat.geom.w }, 0);
                });
                tl.to(coreMat.color, { r: new THREE.Color(cat.color).r, g: new THREE.Color(cat.color).g, b: new THREE.Color(cat.color).b }, 0);
                tl.to(metalMat.color, { r: new THREE.Color(cat.color).r * 0.2, g: new THREE.Color(cat.color).g * 0.2, b: new THREE.Color(cat.color).b * 0.2 }, 0); // Tint metal slightly

                // HTML Card sliding in (Syncs with the car)
                tl.fromTo(cardWrap,
                    { xPercent: cardStartX, opacity: 0, rotationY: isLeftCard ? -20 : 20 },
                    { xPercent: 0, opacity: 1, rotationY: 0, ease: "power2.out" }, 0.2
                );
            });
        });

        // MOBILE LOGIC
        mm.add("(max-width: 1024px)", () => {
            categoriesData.forEach((cat, i) => {
                const section = document.getElementById(`section-${i}`);
                const cardWrap = section.querySelector('.card-wrapper');

                const tl = gsap.timeline({ scrollTrigger: { trigger: section, start: "top 80%", end: "center center", scrub: 1, invalidateOnRefresh: true }});
                
                // Place car securely at the top quarter of the screen, card is naturally at the bottom via CSS
                tl.fromTo(carRig.position, { x: 0, y: -vHeight, z: -5 }, { x: 0, y: () => vHeight * 0.25, z: -2, ease: "power1.out" }, 0); 
                tl.to(carModel.rotation, { y: "+=3.14" }, 0);
                tl.to(coreMat.color, { r: new THREE.Color(cat.color).r, g: new THREE.Color(cat.color).g, b: new THREE.Color(cat.color).b }, 0);
                
                tl.fromTo(cardWrap, { y: 100, opacity: 0 }, { y: 0, opacity: 1, ease: "power2.out" }, 0.3);
            });
        });

        // --- 7. FOOTER FIX: DRIVE STRAIGHT UP ---
        gsap.to(carRig.position, {
            y: () => vHeight, // Drive up past the top of the viewport
            z: -20, // Fade into distance
            ease: "power2.in",
            scrollTrigger: {
                trigger: ".cta-footer",
                start: "top bottom",
                end: "bottom bottom",
                scrub: 1,
                invalidateOnRefresh: true
            }
        });
        
        gsap.to(carModel.rotation, {
            x: -0.8, // Pitch up like taking off
            ease: "power2.in",
            scrollTrigger: { trigger: ".cta-footer", start: "top bottom", end: "bottom bottom", scrub: 1 }
        });

        // --- 8. LENIS SMOOTH SCROLL ---
        const lenis = new Lenis({ duration: 1.2, smooth: true });
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => { lenis.raf(time * 1000); });
        gsap.ticker.lagSmoothing(0);

        // --- 9. 3D RENDER LOOP & CURSOR ROTATION ---
        let targetRotX = 0, targetRotY = 0;

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            
            // 360-Degree Mouse Parallax
            if (window.innerWidth > 1024) {
                // Full rotation control based on mouse
                targetRotY = (normX * Math.PI); 
                targetRotX = (normY * (Math.PI / 4)); 
                
                // Smooth interpolation for the rotation
                carRig.rotation.x += (targetRotX - carRig.rotation.x) * 0.05;
                carRig.rotation.y += (targetRotY - carRig.rotation.y) * 0.05;
                carRig.rotation.z = -carRig.rotation.y * 0.1; // Bank effect
            }

            carModel.position.y = Math.sin(time * 2) * 0.2; 
            wheels.forEach(w => w.rotation.z -= 0.08); 
            coreMat.opacity = 0.6 + Math.sin(time * 5) * 0.4; 

            renderer.render(scene, camera);
        }
        animate();

        // --- 10. RESIZE HANDLER ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            calculateViewport(); // Recalculate Frustum math for exact positioning
        });
    </script>
</body>
</html>
