<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR006 | 3D Interactive Registry</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;800;900&display=swap" rel="stylesheet">
    
    <!-- GSAP, ScrollTrigger, Lenis, and Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>

    <style>
        :root {
            --bg-dark: #050000;
            --bg-red: #2a0005;
            --text: #ffffff;
            --accent: #ff2a2a;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none; /* Hide default cursor */
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: var(--sans);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- PERFORMANCE OPTIMIZED BACKGROUND --- */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 70% 50%, var(--bg-red) 0%, var(--bg-dark) 60%);
            z-index: 1;
        }

        /* 3D Canvas sits behind text, above background */
        #webgl-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none;
        }

        /* --- PERFORMANCE OPTIMIZED CURSOR --- 
           Removed mix-blend-mode. Uses pure border for 60fps tracking */
        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            will-change: transform, width, height;
        }

        /* --- UI LAYOUT --- */
        .content {
            position: relative;
            z-index: 10;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 2rem 4vw;
            display: flex;
            justify-content: space-between;
            z-index: 100;
            font-family: var(--mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.7);
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 10vw;
            pointer-events: none;
        }

        .hero h1 {
            font-size: clamp(4rem, 10vw, 10rem);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -0.04em;
            text-transform: uppercase;
        }

        .outline {
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.5);
        }

        /* Catalog Layout - Text on Left, 3D Car on Right */
        .catalog {
            display: flex;
            flex-direction: column;
            max-width: 1400px;
            margin: 0 auto;
        }

        .car-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 5vw;
        }

        .car-info {
            max-width: 400px;
            pointer-events: auto;
        }

        .car-id {
            font-family: var(--mono);
            color: var(--accent);
            font-size: 1rem;
            margin-bottom: 1rem;
            display: block;
        }

        .car-title {
            font-size: clamp(3rem, 5vw, 5rem);
            font-weight: 800;
            text-transform: uppercase;
            line-height: 0.9;
            margin-bottom: 2rem;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            font-family: var(--mono);
            font-size: 0.85rem;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-transform: uppercase;
            color: #999;
        }

        .meta-row span:last-child {
            color: var(--text);
        }

        .btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: var(--text);
            color: var(--bg-dark);
            font-family: var(--mono);
            font-weight: 600;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: none;
        }

        .btn:hover {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 20px rgba(255, 42, 42, 0.4);
        }

        /* Mobile Adjustments */
        @media (max-width: 900px) {
            .car-section { justify-content: center; text-align: center; }
            .hero { padding: 0 5vw; align-items: center; text-align: center; }
            .custom-cursor { display: none; }
            * { cursor: auto !important; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    
    <!-- Fast, Hardware Accelerated WebGL Canvas -->
    <div id="webgl-container"></div>
    
    <!-- High Performance Cursor -->
    <div class="custom-cursor"></div>

    <nav>
        <div>Brand Lab &copy; 2026</div>
        <div id="nav-model">System Ready</div>
    </nav>

    <div class="content">
        <section class="hero">
            <h1 class="hero-text">
                DIECAST<br>
                <span class="outline">SERIES</span>
            </h1>
            <p style="font-family: var(--mono); margin-top: 2rem; color: var(--accent);">3D INTERACTIVE REGISTRY</p>
        </section>

        <div class="catalog" id="catalog">
            <!-- Injected via JS -->
        </div>
    </div>

    <script>
        // --- 1. DATA (Colors and Scale morphing) ---
        const carData = [
            { id: "001", name: "Apex GT", price: "$245", type: "Hypercar", hex: 0xff2a2a, scale: 1 },
            { id: "002", name: "Night-Spec", price: "$180", type: "Endurance", hex: 0x473DFE, scale: 1.1 },
            { id: "003", name: "Neon Drift", price: "$320", type: "Street", hex: 0x00FF88, scale: 0.9 },
            { id: "004", name: "Halo Zero", price: "$450", type: "Concept", hex: 0x00E5FF, scale: 1.2 }
        ];

        // --- 2. GENERATE UI ---
        const catalog = document.getElementById('catalog');
        carData.forEach((car, i) => {
            const section = document.createElement('div');
            section.className = 'car-section';
            section.id = `section-${i}`;
            section.innerHTML = `
                <div class="car-info">
                    <span class="car-id">MODEL // ${car.id}</span>
                    <h2 class="car-title">${car.name}</h2>
                    <div class="car-meta">
                        <div class="meta-row"><span>Class</span><span>${car.type}</span></div>
                        <div class="meta-row"><span>Unit Price</span><span>${car.price}</span></div>
                        <div class="meta-row"><span>Chassis</span><span>Carbon/Glass</span></div>
                    </div>
                    <a href="#" class="btn hover-target">Configure Vehicle</a>
                </div>
            `;
            catalog.appendChild(section);
        });

        // --- 3. HIGH PERFORMANCE CURSOR (GSAP quickTo) ---
        const cursor = document.querySelector('.custom-cursor');
        const xTo = gsap.quickTo(cursor, "x", {duration: 0.1, ease: "power3"});
        const yTo = gsap.quickTo(cursor, "y", {duration: 0.1, ease: "power3"});
        
        let mouseX = 0;
        let mouseY = 0;

        window.addEventListener("mousemove", e => {
            xTo(e.clientX);
            yTo(e.clientY);
            
            // Normalize mouse coordinates for 3D car rotation (-1 to 1)
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // Hover effect for cursor
        document.querySelectorAll('a, .hover-target').forEach(el => {
            el.addEventListener('mouseenter', () => gsap.to(cursor, { width: 50, height: 50, backgroundColor: "rgba(255,255,255,0.2)" }));
            el.addEventListener('mouseleave', () => gsap.to(cursor, { width: 20, height: 20, backgroundColor: "transparent" }));
        });


        // --- 4. THREE.JS 3D CAR SETUP ---
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 16);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // Capped for performance
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        const accentLight = new THREE.PointLight(0xff2a2a, 3, 20);
        accentLight.position.set(-2, 2, 2);
        scene.add(accentLight);

        // The Car Group
        const carRig = new THREE.Group();
        // Position car on the right side of the screen
        carRig.position.x = window.innerWidth > 900 ? 3 : 0; 
        scene.add(carRig);

        // --- Building the "Glass & Metal" Car ---
        
        // 1. Dark Metal Chassis
        const chassisMat = new THREE.MeshPhysicalMaterial({
            color: 0x0a0a0a,
            metalness: 0.9,
            roughness: 0.2,
            clearcoat: 1.0
        });
        const chassis = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.5, 2.2), chassisMat);
        
        // 2. Glass Cabin
        const cabinMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            transmission: 0.9, // Glass effect
            opacity: 1,
            metalness: 0.1,
            roughness: 0.1,
            ior: 1.5,
            thickness: 0.5
        });
        const cabinGeo = new THREE.CylinderGeometry(0.8, 1.2, 2, 32);
        cabinGeo.rotateZ(Math.PI / 2);
        const cabin = new THREE.Mesh(cabinGeo, cabinMat);
        cabin.position.set(-0.2, 0.7, 0);

        // 3. Glowing Neon Core (Inside the glass)
        const coreMat = new THREE.MeshBasicMaterial({ color: 0xff2a2a });
        const core = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.2, 1), coreMat);
        core.position.set(-0.2, 0.4, 0);

        // 4. Wheels
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.8 });
        const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 32);
        wheelGeo.rotateX(Math.PI / 2);
        
        const wheels = [];
        [[-1.5, -0.2, 1.2], [1.5, -0.2, 1.2], [-1.5, -0.2, -1.2], [1.5, -0.2, -1.2]].forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.position.set(...pos);
            carRig.add(wheel);
            wheels.push(wheel);
        });

        carRig.add(chassis, cabin, core);
        
        // Initial setup
        carRig.rotation.y = -0.5;
        carRig.rotation.x = 0.2;


        // --- 5. GSAP SCROLL & MORPH ANIMATIONS ---
        gsap.registerPlugin(ScrollTrigger);

        // Hero Text Entry
        gsap.fromTo(".hero-text", { opacity: 0, y: 50 }, { opacity: 1, y: 0, duration: 1.5, ease: "power3.out", delay: 0.2 });

        // Scroll Timeline to morph the car per section
        carData.forEach((car, index) => {
            const section = document.getElementById(`section-${index}`);
            
            // Text Fade In
            gsap.fromTo(section.querySelector('.car-info'),
                { opacity: 0, x: -50 },
                { 
                    opacity: 1, x: 0, duration: 1, ease: "power2.out",
                    scrollTrigger: {
                        trigger: section,
                        start: "top 60%",
                        end: "bottom 60%",
                        toggleActions: "play reverse play reverse"
                    }
                }
            );

            // 3D Car Morph & Color Change
            ScrollTrigger.create({
                trigger: section,
                start: "top 50%",
                end: "bottom 50%",
                onEnter: () => updateCar(car),
                onEnterBack: () => updateCar(car)
            });
        });

        function updateCar(carData) {
            document.getElementById('nav-model').innerText = carData.name;
            
            // Animate Core Color
            gsap.to(coreMat.color, {
                r: new THREE.Color(carData.hex).r,
                g: new THREE.Color(carData.hex).g,
                b: new THREE.Color(carData.hex).b,
                duration: 1
            });

            // Animate Accent Light
            gsap.to(accentLight.color, {
                r: new THREE.Color(carData.hex).r,
                g: new THREE.Color(carData.hex).g,
                b: new THREE.Color(carData.hex).b,
                duration: 1
            });

            // Morph Chassis Scale
            gsap.to(carRig.scale, {
                x: carData.scale,
                y: carData.scale,
                z: carData.scale,
                duration: 1,
                ease: "back.out(1.5)"
            });
        }


        // --- 6. LENIS SMOOTH SCROLL ---
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            direction: 'vertical',
            gestureDirection: 'vertical',
            smooth: true,
        });

        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => { lenis.raf(time * 1000); });
        gsap.ticker.lagSmoothing(0);


        // --- 7. 3D RENDER LOOP (WITH MOUSE PARALLAX) ---
        let currentRotationX = 0.2;
        let currentRotationY = -0.5;

        function animate() {
            requestAnimationFrame(animate);
            
            // 1. Mouse Interaction (Lerp towards target rotation)
            // Limit rotation to a subtle range
            const targetRotX = 0.2 + (mouseY * -0.2); 
            const targetRotY = -0.5 + (mouseX * 0.5);

            currentRotationX += (targetRotX - currentRotationX) * 0.05;
            currentRotationY += (targetRotY - currentRotationY) * 0.05;

            carRig.rotation.x = currentRotationX;
            carRig.rotation.y = currentRotationY;

            // 2. Idle Animation
            const time = Date.now() * 0.001;
            carRig.position.y = Math.sin(time * 1.5) * 0.1; // Gentle float
            wheels.forEach(w => w.rotation.z -= 0.02); // Slow wheel spin

            renderer.render(scene, camera);
        }
        animate();


        // --- 8. RESIZE HANDLER ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            // Responsive car placement
            carRig.position.x = window.innerWidth > 900 ? 3 : 0;
        });

    </script>
</body>
</html>
