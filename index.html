<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR006 | Dynamic Brand Lab</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root {
            --bg-dark: #020000;
            --bg-red: #2a0005;
            --text: #f5f5f5;
            --accent: #ff2a2a;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text); 
            font-family: var(--sans); 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased; 
        }

        /* Ambient Red/Black Gradient Background */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 40%, var(--bg-red) 0%, var(--bg-dark) 70%);
            z-index: 0;
        }

        /* Cinematic Noise Texture */
        .noise-overlay {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
            z-index: 1;
            pointer-events: none;
        }

        #webgl-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 2rem 3rem;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            z-index: 100;
            font-family: var(--mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        nav .nav-center { text-align: center; color: var(--accent); font-weight: 600; }
        nav .nav-right { text-align: right; }

        .content {
            position: relative;
            z-index: 10;
        }

        section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 5vw;
        }

        .hero {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100vh;
        }

        .hero h1 {
            font-size: clamp(4rem, 16vw, 16rem);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -0.06em;
            text-transform: uppercase;
            margin-top: 1rem;
        }

        .hero .outline-text {
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.8);
        }

        .car-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 120vh; /* Extra height for smooth scrolling */
        }

        .car-section:nth-child(even) .car-info-wrapper { grid-column: 2; }
        .car-section:nth-child(odd) .car-info-wrapper { grid-column: 1; }

        .car-info {
            max-width: 500px;
            padding: 3rem;
            background: rgba(5, 0, 0, 0.6);
            border: 1px solid rgba(255, 42, 42, 0.15);
            backdrop-filter: blur(16px);
            border-radius: 4px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            opacity: 0; /* For GSAP Fade */
            transform: translateY(50px);
        }

        .car-number {
            font-family: var(--mono);
            color: var(--accent);
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: block;
            letter-spacing: 0.1em;
        }

        .car-title {
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
        }

        .car-meta {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 1.5rem;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            font-family: var(--mono);
            font-size: 0.85rem;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-transform: uppercase;
            color: #aaa;
        }

        .meta-row span:last-child {
            color: var(--text);
            font-weight: 500;
        }

        .cta-footer {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-top: 1px solid rgba(255, 42, 42, 0.2);
            background: radial-gradient(circle at top, rgba(100, 0, 5, 0.6) 0%, transparent 70%);
        }

        .buy-btn {
            background: var(--accent);
            color: white;
            padding: 1.2rem 3rem;
            text-decoration: none;
            font-family: var(--mono);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-block;
            margin-top: 2rem;
            border: 1px solid var(--accent);
        }

        .buy-btn:hover {
            background: transparent;
            color: var(--accent);
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 42, 42, 0.4);
        }

        @media (max-width: 900px) {
            .car-section { grid-template-columns: 1fr !important; gap: 2rem; }
            .car-section:nth-child(even) .car-info-wrapper,
            .car-section:nth-child(odd) .car-info-wrapper { grid-column: 1; }
            nav { grid-template-columns: 1fr 1fr; padding: 1.5rem; }
            nav .nav-center { display: none; }
            .car-info { padding: 2rem; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <div class="noise-overlay"></div>
    <div id="webgl-container"></div>

    <nav>
        <div>Brand Lab &copy; 2026</div>
        <div class="nav-center">DYNAMIC REGISTRY</div>
        <div class="nav-right" id="active-id">INIT</div>
    </nav>

    <main class="content">
        <section class="hero">
            <div style="font-family: var(--mono); color: var(--accent); letter-spacing: 0.2em; font-size: 0.9rem;" class="hero-fade">PROCEDURAL SERIES</div>
            <h1 class="hero-zoom">
                MORPH<br>
                <span class="outline-text">DRIVE</span>
            </h1>
        </section>

        <!-- 10 CAR SECTIONS -->
        <div id="catalog"></div>

        <section class="cta-footer">
            <h2 class="hero-zoom" style="font-size: clamp(3rem, 8vw, 6rem); font-weight: 900; line-height: 1; text-transform: uppercase; letter-spacing: -0.04em;">ACQUIRE <br> THE FLEET</h2>
            <a href="#" class="buy-btn hero-fade">Access Portal</a>
        </section>
    </main>

    <script>
        // --- 1. DATA & MORPH CONFIGURATIONS ---
        // 'geom' configures the 3D scale/morphing of the wireframe car
        // length = chassis length, width = width, spoilerY = spoiler height, wheelScale = wheel size
        const carData = [
            { id: "001", name: "Crimson-X", price: "$245", type: "Hypercar", color: "#ff2a2a", geom: { length: 1, width: 1, spoilerY: 0.8, wheelScale: 1 } },
            { id: "002", name: "Night-Fall", price: "$180", type: "Track Spec", color: "#473DFE", geom: { length: 1.1, width: 1.2, spoilerY: 1.2, wheelScale: 1.1 } },
            { id: "003", name: "Apex-R", price: "$320", type: "Prototype", color: "#00FF88", geom: { length: 1.3, width: 0.9, spoilerY: 0.5, wheelScale: 0.9 } },
            { id: "004", name: "Velocity-9", price: "$150", type: "Street", color: "#FFD700", geom: { length: 0.9, width: 1.1, spoilerY: 0.9, wheelScale: 1.2 } },
            { id: "005", name: "Blood-Line", price: "$290", type: "Hypercar", color: "#ff0055", geom: { length: 1.15, width: 1.05, spoilerY: 1.1, wheelScale: 1.05 } },
            { id: "006", name: "Iron-Lung", price: "$175", type: "Muscle", color: "#aaaaaa", geom: { length: 1.0, width: 1.3, spoilerY: 0.6, wheelScale: 1.3 } },
            { id: "007", name: "Zenith-V", price: "$410", type: "Concept", color: "#00E5FF", geom: { length: 1.4, width: 0.8, spoilerY: 0.4, wheelScale: 0.8 } },
            { id: "008", name: "Pulse-Red", price: "$130", type: "Drift", color: "#8844FF", geom: { length: 0.95, width: 1.25, spoilerY: 1.4, wheelScale: 1.1 } },
            { id: "009", name: "Vortex-GT", price: "$260", type: "Endurance", color: "#FFAA00", geom: { length: 1.25, width: 1.15, spoilerY: 0.9, wheelScale: 1 } },
            { id: "010", name: "Abyss-0", price: "$500", type: "Halo", color: "#ffffff", geom: { length: 1.5, width: 1.4, spoilerY: 1.5, wheelScale: 1.4 } }
        ];

        // --- 2. GENERATE UI ---
        const catalog = document.getElementById('catalog');
        carData.forEach(car => {
            const section = document.createElement('section');
            section.className = 'car-section';
            section.id = `section-${car.id}`;
            section.innerHTML = `
                <div class="car-info-wrapper">
                    <div class="car-info">
                        <span class="car-number">MODEL // ${car.id}</span>
                        <h2 class="car-title">${car.name}</h2>
                        <div class="car-meta">
                            <div class="meta-row"><span>Classification</span><span>${car.type}</span></div>
                            <div class="meta-row"><span>Unit Price</span><span>${car.price}</span></div>
                            <div class="meta-row"><span>Chassis Config</span><span>Dynamic Morph</span></div>
                            <div class="meta-row"><span>Core Hue</span><span style="color:${car.color}">${car.color.toUpperCase()}</span></div>
                        </div>
                    </div>
                </div>
            `;
            catalog.appendChild(section);
        });

        // --- 3. THREE.JS SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x1a0000, 0.03);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        // Lighting
        const mainLight = new THREE.PointLight(0xffffff, 1.5, 50);
        mainLight.position.set(5, 5, 5);
        scene.add(mainLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));

        // Procedural Car Rig
        const carRig = new THREE.Group();
        const carGroup = new THREE.Group(); // Inner group for local rotation
        carRig.add(carGroup);
        scene.add(carRig);
        
        const wireframeMat = new THREE.MeshBasicMaterial({ 
            color: 0xffffff, 
            wireframe: true, 
            transparent: true, 
            opacity: 0.2 
        });
        
        // Car Parts (Accessible for Morphing)
        const mainBody = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.5, 2.2), wireframeMat);
        const cabin = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.2, 2, 4).rotateZ(Math.PI / 2), wireframeMat);
        cabin.position.set(-0.2, 0.8, 0);
        const spoiler = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 2.2), wireframeMat);
        spoiler.position.set(2, 0.8, 0);

        carGroup.add(mainBody, cabin, spoiler);

        // Wheels
        const wheelGeo = new THREE.TorusGeometry(0.4, 0.15, 8, 16);
        const wheels = [];
        const baseWheelPositions = [[-1.5, -0.2, 1.2], [1.5, -0.2, 1.2], [-1.5, -0.2, -1.2], [1.5, -0.2, -1.2]];
        baseWheelPositions.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, wireframeMat);
            wheel.position.set(...pos);
            wheel.rotation.x = Math.PI / 2;
            carGroup.add(wheel);
            wheels.push(wheel);
        });

        // Glowing Core
        const coreMat = new THREE.MeshBasicMaterial({ color: 0xff2a2a, transparent: true, opacity: 0.8 });
        const core = new THREE.Mesh(new THREE.BoxGeometry(2, 0.2, 1), coreMat);
        carGroup.add(core);

        // --- 4. MASTER CINEMATIC GSAP TIMELINE ---
        gsap.registerPlugin(ScrollTrigger);

        // Intro Hero Animations
        gsap.fromTo(".hero-zoom", 
            { scale: 1.3, opacity: 0 }, 
            { scale: 1, opacity: 1, duration: 1.5, stagger: 0.2, ease: "power3.out", delay: 0.2 }
        );
        gsap.fromTo(".hero-fade", 
            { y: 30, opacity: 0 }, 
            { y: 0, opacity: 1, duration: 1, delay: 0.8, ease: "power2.out" }
        );

        // Reveal UI Cards on Scroll
        gsap.utils.toArray('.car-info').forEach(box => {
            gsap.to(box, {
                opacity: 1,
                y: 0,
                duration: 1,
                ease: "back.out(1)",
                scrollTrigger: {
                    trigger: box,
                    start: "top 80%",
                }
            });
        });

        // Setup the Master WebGL Timeline tied to the entire Catalog
        const masterTl = gsap.timeline({
            scrollTrigger: {
                trigger: "#catalog",
                start: "top bottom", // Starts when catalog enters screen
                end: "bottom bottom", // Ends when catalog hits bottom
                scrub: 1 // Smooth scrubbing
            }
        });

        // Hero exit: Car zooms in from far back
        carRig.position.set(0, 0, -10);
        carGroup.rotation.set(0.5, 0, 0);

        // Calculate progress steps based on 10 cars
        const step = 1 / carData.length;

        carData.forEach((car, i) => {
            const isEven = i % 2 === 0;
            const targetX = isEven ? -4 : 4; // Drift left or right
            const targetRotY = isEven ? Math.PI * 0.8 : Math.PI * 1.2; // Dramatic angles
            
            const segmentTl = gsap.timeline();

            // 1. Move & Spin the Car Rig
            segmentTl.to(carRig.position, { 
                x: targetX, 
                z: 3, // Zoom in close to the text
                y: Math.sin(i) * 0.5, // Slight elevation change
                ease: "power1.inOut" 
            }, 0);

            segmentTl.to(carGroup.rotation, { 
                y: targetRotY + (i * Math.PI), // Continuous spin combined with angle
                x: 0.2,
                ease: "power1.inOut" 
            }, 0);

            // 2. Morph the Geometry (The "Different Cars" effect)
            segmentTl.to(mainBody.scale, { x: car.geom.length, z: car.geom.width, ease: "power2.inOut" }, 0);
            segmentTl.to(cabin.scale, { x: car.geom.length, z: car.geom.width, ease: "power2.inOut" }, 0);
            segmentTl.to(spoiler.scale, { x: car.geom.width, ease: "power2.inOut" }, 0);
            segmentTl.to(spoiler.position, { y: car.geom.spoilerY, x: 2 * car.geom.length, ease: "power2.inOut" }, 0);
            
            // Adjust wheels
            wheels.forEach((w, wIdx) => {
                const base = baseWheelPositions[wIdx];
                segmentTl.to(w.scale, { x: car.geom.wheelScale, y: car.geom.wheelScale, z: car.geom.wheelScale, ease: "power2.inOut" }, 0);
                segmentTl.to(w.position, { x: base[0] * car.geom.length, z: base[2] * car.geom.width, ease: "power2.inOut" }, 0);
            });

            // 3. Change Colors (Using GSAP ColorPropsPlugin implicitly)
            segmentTl.to(coreMat.color, { 
                r: new THREE.Color(car.color).r, 
                g: new THREE.Color(car.color).g, 
                b: new THREE.Color(car.color).b, 
                ease: "none" 
            }, 0);

            // Update UI ID via ScrollTrigger on the segment
            ScrollTrigger.create({
                trigger: `#section-${car.id}`,
                start: "top center",
                end: "bottom center",
                onEnter: () => document.getElementById('active-id').innerText = `TARGET: ${car.id}`,
                onEnterBack: () => document.getElementById('active-id').innerText = `TARGET: ${car.id}`
            });

            // Add this car's segment to the master timeline
            masterTl.add(segmentTl, i * step);
        });

        // Final zoom out on the footer
        masterTl.to(carRig.position, { z: -10, x: 0, y: 0, duration: step }, "-=0");
        masterTl.to(carGroup.rotation, { y: "+=3.14", x: 0.5, duration: step }, "-=" + step);


        // --- 5. RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            
            // Idle hover effect
            carRig.position.y += Math.sin(time * 2) * 0.002;
            
            // Constant wheel spin
            wheels.forEach(w => w.rotation.z -= 0.05);

            // Pulsing core light
            coreMat.opacity = 0.6 + Math.sin(time * 5) * 0.4;

            renderer.render(scene, camera);
        }
        animate();

        // --- 6. WINDOW RESIZE ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
