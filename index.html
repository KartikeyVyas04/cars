<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR006 | Dynamic Architecture</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>

    <style>
        :root {
            --bg-dark: #020000;
            --bg-red: #2a0005;
            --text: #f5f5f5;
            --accent: #ff2a2a;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text); 
            font-family: var(--sans); 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased; 
        }

        .bg-gradient {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 40%, var(--bg-red) 0%, var(--bg-dark) 70%);
            z-index: 0;
        }

        .noise-overlay {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
            z-index: 1;
            pointer-events: none;
        }

        #webgl-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        /* --- CUSTOM CURSOR --- */
        .cursor-dot, .cursor-ring {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
        }
        .cursor-dot { width: 6px; height: 6px; background: white; }
        .cursor-ring {
            width: 30px; height: 30px;
            border: 1px solid rgba(255,255,255,0.5);
            transition: width 0.3s ease, height 0.3s ease, border-color 0.3s ease;
        }
        .cursor-ring.active {
            width: 60px; height: 60px;
            border-color: var(--accent);
            background: rgba(255, 42, 42, 0.1);
            backdrop-filter: blur(2px);
        }

        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 2rem 3rem;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            z-index: 100;
            font-family: var(--mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }
        nav .nav-center { text-align: center; color: var(--accent); font-weight: 600; }
        nav .nav-right { text-align: right; }

        .content { position: relative; z-index: 10; }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .hero h1 {
            font-size: clamp(3.5rem, 14vw, 14rem);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -0.05em;
            text-transform: uppercase;
        }
        .hero .outline-text { color: transparent; -webkit-text-stroke: 1px rgba(255, 255, 255, 0.8); }

        .catalog { max-width: 1600px; margin: 0 auto; padding: 10vh 5vw; }

        .category-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            width: 100%;
            margin-bottom: 10vh;
        }
        .category-section:nth-child(odd) { justify-content: flex-start; }
        .category-section:nth-child(even) { justify-content: flex-end; }

        .card-wrapper {
            width: 100%;
            max-width: 500px;
            perspective: 1200px;
        }

        .category-card {
            padding: 4rem 3rem;
            background: rgba(10, 0, 0, 0.6);
            border: 1px solid rgba(255, 42, 42, 0.2);
            backdrop-filter: blur(16px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            transform-style: preserve-3d;
            will-change: transform;
        }

        .category-section:nth-child(odd) .category-card { border-left: 3px solid var(--accent); }
        .category-section:nth-child(even) .category-card { border-right: 3px solid var(--accent); text-align: right; }

        .category-card > * { transform: translateZ(30px); }

        .category-id {
            font-family: var(--mono);
            color: var(--accent);
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: block;
            letter-spacing: 0.1em;
        }

        .category-title {
            font-size: clamp(2.5rem, 4vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }
        
        .category-desc {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #aaa;
            margin-bottom: 2.5rem;
            transform: translateZ(20px);
        }

        .explore-btn {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            background: transparent;
            color: var(--text);
            padding: 1rem 0;
            text-decoration: none;
            font-family: var(--mono);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid var(--accent);
            transition: all 0.3s ease;
            transform: translateZ(40px);
        }
        .explore-btn:hover { gap: 1.5rem; color: var(--accent); }

        .cta-footer {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-top: 1px solid rgba(255, 42, 42, 0.2);
            background: radial-gradient(circle at top, rgba(100, 0, 5, 0.6) 0%, transparent 70%);
            position: relative;
            z-index: 20; 
        }

        #progress-bar {
            position: fixed;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            height: 300px;
            width: 1px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        #progress-inner {
            width: 3px; height: 0%;
            background: var(--accent);
            transform: translateX(-1px);
        }

        @media (max-width: 1024px) {
            .category-section { justify-content: center !important; }
            .category-section:nth-child(odd) .category-card,
            .category-section:nth-child(even) .category-card {
                text-align: center; border-left: none; border-right: none; border-top: 3px solid var(--accent);
            }
            .cursor-dot, .cursor-ring { display: none; }
            * { cursor: auto !important; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <div class="noise-overlay"></div>
    <div id="webgl-container"></div>

    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <nav>
        <div>Brand Lab &copy; 2026</div>
        <div class="nav-center">SYSTEM CATEGORIES</div>
        <div class="nav-right" id="active-id">AWAITING INPUT</div>
    </nav>

    <div id="progress-bar"><div id="progress-inner"></div></div>

    <main class="content">
        <section class="hero">
            <div style="font-family: var(--mono); color: var(--accent); letter-spacing: 0.2em; font-size: 0.9rem;" class="hero-fade">SELECT ARCHITECTURE</div>
            <h1 class="hero-zoom">
                DIECAST<br>
                <span class="outline-text">FLEET</span>
            </h1>
        </section>

        <div class="catalog" id="catalog">
            <!-- Cards Injected via JS -->
        </div>

        <section class="cta-footer">
            <h2 class="hero-zoom" style="font-size: clamp(3rem, 8vw, 6rem); font-weight: 900; line-height: 1; text-transform: uppercase; letter-spacing: -0.04em;">VIEW FULL<br> REGISTRY</h2>
            <a href="#" class="explore-btn hover-target" style="margin-top: 2rem; border: 1px solid var(--accent); padding: 1rem 3rem;">Access Portal</a>
        </section>
    </main>

    <script>
        // --- 1. DATA CONFIGURATION ---
        const categoriesData = [
            { id: "01", title: "Hyper-Aero", desc: "Engineered for absolute zero drag. Wide wheelbases, slammed suspensions, and aggressive aerodynamics.", color: "#ff2a2a", geom: { l: 1.2, w: 1.1, s: 0.5, wh: 1 } },
            { id: "02", title: "Track-Spec", desc: "Built for the circuit. Featuring massive high-downforce rear wings, roll cages, and extreme camber setups.", color: "#473DFE", geom: { l: 1.0, w: 1.2, s: 1.4, wh: 1.1 } },
            { id: "03", title: "Street Drift", desc: "Underground aesthetics. Short wheelbases, widebody kits, and neon underglow cores.", color: "#FFD700", geom: { l: 0.85, w: 1.3, s: 0.8, wh: 1.2 } },
            { id: "04", title: "Halo Concept", desc: "The future of automotive design. Elongated chassis, conceptual wheel covers, and abstract geometry.", color: "#00E5FF", geom: { l: 1.5, w: 0.9, s: 0.3, wh: 0.8 } }
        ];

        // --- 2. GENERATE UI ---
        const catalog = document.getElementById('catalog');
        categoriesData.forEach((cat, index) => {
            const section = document.createElement('div');
            section.className = 'category-section';
            section.id = `section-${index}`;
            
            section.innerHTML = `
                <div class="card-wrapper scroll-target">
                    <div class="category-card interactive-card">
                        <span class="category-id">SERIES // ${cat.id}</span>
                        <h2 class="category-title" style="color: ${cat.color}">${cat.title}</h2>
                        <p class="category-desc">${cat.desc}</p>
                        <a href="category-${cat.id}.html" class="explore-btn hover-target">Explore Series &rarr;</a>
                    </div>
                </div>
            `;
            catalog.appendChild(section);
        });

        // --- 3. CUSTOM CURSOR & CARD PARALLAX ---
        const dot = document.querySelector('.cursor-dot');
        const ring = document.querySelector('.cursor-ring');
        
        const xDotTo = gsap.quickTo(dot, "x", {duration: 0.1, ease: "power3"});
        const yDotTo = gsap.quickTo(dot, "y", {duration: 0.1, ease: "power3"});
        const xRingTo = gsap.quickTo(ring, "x", {duration: 0.3, ease: "power3"});
        const yRingTo = gsap.quickTo(ring, "y", {duration: 0.3, ease: "power3"});

        let mouseX = 0; let mouseY = 0;
        let normX = 0; let normY = 0;

        window.addEventListener("mousemove", (e) => {
            xDotTo(e.clientX); yDotTo(e.clientY);
            xRingTo(e.clientX); yRingTo(e.clientY);
            
            // Normalized coords for 3D car rotation (-1 to 1)
            normX = (e.clientX / window.innerWidth) * 2 - 1;
            normY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        document.querySelectorAll('.hover-target').forEach(el => {
            el.addEventListener('mouseenter', () => ring.classList.add('active'));
            el.addEventListener('mouseleave', () => ring.classList.remove('active'));
        });

        document.querySelectorAll('.interactive-card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                gsap.to(card, {
                    rotateY: (x / (rect.width / 2)) * 15,
                    rotateX: (y / (rect.height / 2)) * -15,
                    duration: 0.5,
                    ease: "power2.out"
                });
            });
            card.addEventListener('mouseleave', () => {
                gsap.to(card, { rotateY: 0, rotateX: 0, duration: 1, ease: "elastic.out(1, 0.3)" });
            });
            card.addEventListener('mouseenter', () => ring.classList.add('active'));
            card.addEventListener('mouseleave', () => ring.classList.remove('active'));
        });

        // --- 4. THREE.JS PROCEDURAL CAR ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x1a0000, 0.03);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 16);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        const mainLight = new THREE.PointLight(0xffffff, 1.5, 50);
        mainLight.position.set(5, 5, 5);
        scene.add(mainLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));

        const carRig = new THREE.Group();     // Controlled by GSAP Position & Mouse Rotation
        const carModel = new THREE.Group();   // Controlled by GSAP Rotation (Spins)
        carRig.add(carModel);
        scene.add(carRig);
        
        const wireframeMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.25 });
        
        const mainBody = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.5, 2.2), wireframeMat);
        const cabin = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.2, 2, 4).rotateZ(Math.PI / 2), wireframeMat);
        cabin.position.set(-0.2, 0.8, 0);
        const spoiler = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 2.2), wireframeMat);
        spoiler.position.set(2, 0.8, 0);

        carModel.add(mainBody, cabin, spoiler);

        const wheelGeo = new THREE.TorusGeometry(0.4, 0.15, 8, 16);
        const wheels = [];
        const baseWheelPositions = [[-1.5, -0.2, 1.2], [1.5, -0.2, 1.2], [-1.5, -0.2, -1.2], [1.5, -0.2, -1.2]];
        baseWheelPositions.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, wireframeMat);
            wheel.position.set(...pos);
            wheel.rotation.x = Math.PI / 2;
            carModel.add(wheel);
            wheels.push(wheel);
        });

        const coreMat = new THREE.MeshBasicMaterial({ color: 0xff2a2a, transparent: true, opacity: 0.9 });
        const core = new THREE.Mesh(new THREE.BoxGeometry(2, 0.2, 1), coreMat);
        carModel.add(core);

        // --- 5. GSAP SCROLL & SYNCHRONIZATION ---
        gsap.registerPlugin(ScrollTrigger);

        // Intro
        gsap.fromTo(".hero-zoom", { scale: 1.2, opacity: 0 }, { scale: 1, opacity: 1, duration: 1.5, ease: "power3.out", delay: 0.2 });
        gsap.fromTo(".hero-fade", { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 1, delay: 0.8, ease: "power2.out" });

        // Scroll Progress Bar
        gsap.to("#progress-inner", {
            height: "100%", ease: "none",
            scrollTrigger: { trigger: document.body, start: "top top", end: "bottom bottom", scrub: 0.1 }
        });

        let mm = gsap.matchMedia();
        let accumulatedRotation = Math.PI * 0.8; // Base rotation

        // DESKTOP LOGIC (The S-Curve Drive & Brought Card Effect)
        mm.add("(min-width: 1025px)", () => {
            
            const aspect = window.innerWidth / window.innerHeight;

            categoriesData.forEach((cat, i) => {
                const section = document.getElementById(`section-${i}`);
                const cardWrap = section.querySelector('.scroll-target');
                const isLeft = i % 2 === 0;

                const targetCarX = isLeft ? (3.5 * aspect) : -(3.5 * aspect); 
                const cardStartX = isLeft ? -150 : 150; // Card slides from opposite of car

                if (i === 0) {
                    // Initial Drive In from Hero
                    gsap.fromTo(carRig.position, 
                        { z: -20, x: 0 }, 
                        { z: 0, x: targetCarX, ease: "power2.out",
                          scrollTrigger: { trigger: section, start: "top bottom", end: "center center", scrub: 1 } 
                        }
                    );
                    carModel.rotation.y = accumulatedRotation;
                } else {
                    // Continuous sweeping arc from previous car
                    const tl = gsap.timeline({
                        scrollTrigger: {
                            trigger: section,
                            start: "top bottom",
                            end: "center center",
                            scrub: 1
                        }
                    });

                    // Arc Sweep: Drive across X, curve out to Z and back to 0
                    tl.to(carRig.position, { x: targetCarX, ease: "power1.inOut" }, 0);
                    tl.to(carRig.position, { z: 5, duration: 0.5, ease: "power1.out" }, 0);
                    tl.to(carRig.position, { z: 0, duration: 0.5, ease: "power1.in" }, 0.5);

                    // Continuous Drift Spin
                    accumulatedRotation += Math.PI; // Add 180 degrees every sweep
                    tl.to(carModel.rotation, { y: accumulatedRotation, ease: "power1.inOut" }, 0);

                    // Morph Geometry while crossing
                    tl.to(mainBody.scale, { x: cat.geom.l, z: cat.geom.w }, 0);
                    tl.to(cabin.scale, { x: cat.geom.l, z: cat.geom.w }, 0);
                    tl.to(spoiler.scale, { x: cat.geom.w }, 0);
                    tl.to(spoiler.position, { y: cat.geom.s, x: 2 * cat.geom.l }, 0);
                    wheels.forEach((w, wIdx) => {
                        tl.to(w.scale, { x: cat.geom.wh, y: cat.geom.wh, z: cat.geom.wh }, 0);
                        tl.to(w.position, { x: baseWheelPositions[wIdx][0] * cat.geom.l, z: baseWheelPositions[wIdx][2] * cat.geom.w }, 0);
                    });
                    tl.to(coreMat.color, { r: new THREE.Color(cat.color).r, g: new THREE.Color(cat.color).g, b: new THREE.Color(cat.color).b }, 0);
                }

                // The Card Slide-in (Car brings it)
                gsap.fromTo(cardWrap,
                    { x: cardStartX, opacity: 0, scale: 0.95 },
                    { 
                        x: 0, opacity: 1, scale: 1, ease: "back.out(1.2)",
                        scrollTrigger: {
                            trigger: section,
                            start: "top 60%", // Triggers slightly after car starts moving
                            end: "center center",
                            scrub: 1,
                            onEnter: () => document.getElementById('active-id').innerText = `SERIES: ${cat.id}`,
                            onEnterBack: () => document.getElementById('active-id').innerText = `SERIES: ${cat.id}`
                        }
                    }
                );
            });
        });

        // MOBILE LOGIC
        mm.add("(max-width: 1024px)", () => {
            categoriesData.forEach((cat, i) => {
                const section = document.getElementById(`section-${i}`);
                const cardWrap = section.querySelector('.scroll-target');

                gsap.fromTo(cardWrap, { y: 100, opacity: 0 }, { y: 0, opacity: 1, duration: 1, scrollTrigger: { trigger: section, start: "top 75%" }});

                const tl = gsap.timeline({ scrollTrigger: { trigger: section, start: "top 75%", end: "center center", scrub: 1 }});
                tl.to(carRig.position, { x: 0, y: 4, z: -2 }, 0); 
                tl.to(carModel.rotation, { y: "+=3.14" }, 0);
                tl.to(coreMat.color, { r: new THREE.Color(cat.color).r, g: new THREE.Color(cat.color).g, b: new THREE.Color(cat.color).b }, 0);
            });
        });

        // --- 6. FOOTER FIX: DRIVE AWAY ---
        // Pushes the car straight up and into the background when reaching the footer
        gsap.to(carRig.position, {
            y: 12,
            z: -30,
            ease: "power2.in",
            scrollTrigger: {
                trigger: ".cta-footer",
                start: "top bottom",
                end: "bottom bottom",
                scrub: 1
            }
        });
        
        gsap.to(carModel.rotation, {
            x: -0.5,
            ease: "power2.in",
            scrollTrigger: {
                trigger: ".cta-footer",
                start: "top bottom",
                end: "bottom bottom",
                scrub: 1
            }
        });

        // --- 7. LENIS SMOOTH SCROLL ---
        const lenis = new Lenis({ duration: 1.2, smooth: true });
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => { lenis.raf(time * 1000); });
        gsap.ticker.lagSmoothing(0);

        // --- 8. 3D RENDER LOOP & CURSOR ROTATION ---
        let currentRotX = 0;
        let currentRotY = 0;

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            
            // 360-Degree Mouse Parallax
            if (window.innerWidth > 1024) {
                // normX/Y is -1 to 1. Map to large rotations.
                const targetRotY = (normX * Math.PI); // Allow full view of sides
                const targetRotX = (normY * (Math.PI / 4)); // 45 deg up/down
                
                currentRotX += (targetRotX - currentRotX) * 0.05;
                currentRotY += (targetRotY - currentRotY) * 0.05;
                
                carRig.rotation.x = currentRotX;
                carRig.rotation.y = currentRotY;
                carRig.rotation.z = -currentRotY * 0.1; // Slight bank based on horizontal pan
            }

            carModel.position.y = Math.sin(time * 2) * 0.2; // Idle float
            wheels.forEach(w => w.rotation.z -= 0.05); // Spin wheels
            coreMat.opacity = 0.6 + Math.sin(time * 5) * 0.4; // Pulse core

            renderer.render(scene, camera);
        }
        animate();

        // --- 9. RESIZE HANDLER ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
