<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR006 | Brand Lab Categories</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root {
            --bg-dark: #020000;
            --bg-red: #2a0005;
            --text: #f5f5f5;
            --accent: #ff2a2a;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text); 
            font-family: var(--sans); 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased; 
        }

        /* Ambient Red/Black Gradient Background */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 40%, var(--bg-red) 0%, var(--bg-dark) 70%);
            z-index: 0;
        }

        /* Cinematic Noise Texture */
        .noise-overlay {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
            z-index: 1;
            pointer-events: none;
        }

        #webgl-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 2rem 3rem;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            z-index: 100;
            font-family: var(--mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        nav .nav-center { text-align: center; color: var(--accent); font-weight: 600; }
        nav .nav-right { text-align: right; }

        .content {
            position: relative;
            z-index: 10;
        }

        section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 5vw;
        }

        .hero {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100vh;
        }

        .hero h1 {
            font-size: clamp(3.5rem, 12vw, 12rem);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            margin-top: 1rem;
        }

        .hero .outline-text {
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.8);
        }

        /* --- NEW CATEGORY LAYOUT --- */
        .category-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            min-height: 120vh; /* Extra height for smooth scrubbing */
        }

        /* Alternate sides for desktop */
        .category-section:nth-child(even) { flex-direction: row-reverse; }

        .category-card {
            width: 100%;
            max-width: 550px;
            padding: 4rem 3rem;
            background: rgba(5, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--accent);
            backdrop-filter: blur(16px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            opacity: 0; /* Handled by GSAP */
            transform: translateY(50px);
        }

        /* Override border for even items to put the accent line on the right */
        .category-section:nth-child(even) .category-card {
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 3px solid var(--accent);
            text-align: right;
        }

        .category-id {
            font-family: var(--mono);
            color: var(--accent);
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: block;
            letter-spacing: 0.1em;
        }

        .category-title {
            font-size: clamp(2.5rem, 4vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }
        
        .category-desc {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #aaa;
            margin-bottom: 2.5rem;
        }

        .explore-btn {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            background: transparent;
            color: var(--text);
            padding: 1rem 0;
            text-decoration: none;
            font-family: var(--mono);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid var(--accent);
            transition: all 0.3s ease;
        }

        .explore-btn:hover {
            gap: 1.5rem;
            color: var(--accent);
        }

        .cta-footer {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-top: 1px solid rgba(255, 42, 42, 0.2);
            background: radial-gradient(circle at top, rgba(100, 0, 5, 0.6) 0%, transparent 70%);
        }

        /* Scroll Progress Indicator */
        #progress-bar {
            position: fixed;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            height: 300px;
            width: 1px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        #progress-inner {
            width: 3px;
            height: 0%;
            background: var(--accent);
            transform: translateX(-1px);
        }

        @media (max-width: 1024px) {
            .category-section, .category-section:nth-child(even) { 
                flex-direction: column; 
                justify-content: flex-end; 
                padding-bottom: 10vh;
            }
            .category-card { 
                max-width: 100%; 
                text-align: center; 
                border-left: none; 
                border-top: 3px solid var(--accent);
                padding: 2.5rem 1.5rem;
                background: rgba(5, 0, 0, 0.85); /* Darker on mobile for readability */
            }
            .category-section:nth-child(even) .category-card {
                border-right: none;
                border-top: 3px solid var(--accent);
                text-align: center;
            }
            nav { grid-template-columns: 1fr 1fr; padding: 1.5rem; }
            nav .nav-center { display: none; }
            #progress-bar { display: none; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <div class="noise-overlay"></div>
    <div id="webgl-container"></div>
    <div id="progress-bar"><div id="progress-inner"></div></div>

    <nav>
        <div>Brand Lab &copy; 2026</div>
        <div class="nav-center">SERIES CATEGORIES</div>
        <div class="nav-right" id="active-id">AWAITING INPUT</div>
    </nav>

    <main class="content">
        <section class="hero">
            <div style="font-family: var(--mono); color: var(--accent); letter-spacing: 0.2em; font-size: 0.9rem;" class="hero-fade">SELECT YOUR ARCHITECTURE</div>
            <h1 class="hero-zoom">
                DIECAST<br>
                <span class="outline-text">SERIES</span>
            </h1>
        </section>

        <!-- CATEGORIES GENERATED HERE -->
        <div id="catalog"></div>

        <section class="cta-footer">
            <h2 class="hero-zoom" style="font-size: clamp(3rem, 8vw, 6rem); font-weight: 900; line-height: 1; text-transform: uppercase; letter-spacing: -0.04em;">VIEW FULL<br> REGISTRY</h2>
            <a href="catalog-all.html" class="explore-btn hero-fade" style="margin-top: 2rem; border: 1px solid var(--accent); padding: 1rem 3rem;">View All Models</a>
        </section>
    </main>

    <script>
        // --- 1. DATA: CATEGORIES ---
        const categoriesData = [
            { 
                id: "01", 
                title: "Hyper-Aero", 
                desc: "Engineered for absolute zero drag. Wide wheelbases, slammed suspensions, and aggressive aerodynamics.", 
                link: "catalog.html?category=hyper-aero", 
                color: "#ff2a2a", 
                geom: { length: 1.2, width: 1.1, spoilerY: 0.5, wheelScale: 1 } 
            },
            { 
                id: "02", 
                title: "Track-Spec", 
                desc: "Built for the circuit. Featuring massive high-downforce rear wings, roll cages, and extreme camber setups.", 
                link: "catalog.html?category=track-spec", 
                color: "#473DFE", 
                geom: { length: 1.0, width: 1.2, spoilerY: 1.4, wheelScale: 1.1 } 
            },
            { 
                id: "03", 
                title: "Street Drift", 
                desc: "Underground aesthetics. Short wheelbases, widebody kits, and neon underglow cores.", 
                link: "catalog.html?category=street-drift", 
                color: "#FFD700", 
                geom: { length: 0.85, width: 1.3, spoilerY: 0.8, wheelScale: 1.2 } 
            },
            { 
                id: "04", 
                title: "Halo Concept", 
                desc: "The future of automotive design. Elongated chassis, conceptual wheel covers, and abstract geometry.", 
                link: "catalog.html?category=halo-concept", 
                color: "#00E5FF", 
                geom: { length: 1.5, width: 0.9, spoilerY: 0.3, wheelScale: 0.8 } 
            }
        ];

        // --- 2. GENERATE UI ---
        const catalog = document.getElementById('catalog');
        categoriesData.forEach(cat => {
            const section = document.createElement('section');
            section.className = 'category-section';
            section.id = `section-${cat.id}`;
            
            // Empty div acts as a spacer to push the card to the side on desktop
            section.innerHTML = `
                <div class="spacer" style="flex: 1;"></div>
                <div class="category-card">
                    <span class="category-id">SERIES // ${cat.id}</span>
                    <h2 class="category-title" style="color: ${cat.color}">${cat.title}</h2>
                    <p class="category-desc">${cat.desc}</p>
                    <a href="${cat.link}" class="explore-btn">Explore Series &rarr;</a>
                </div>
            `;
            catalog.appendChild(section);
        });

        // --- 3. THREE.JS SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x1a0000, 0.03);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        const mainLight = new THREE.PointLight(0xffffff, 1.5, 50);
        mainLight.position.set(5, 5, 5);
        scene.add(mainLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));

        // Procedural Car Rig
        const carRig = new THREE.Group();
        const carGroup = new THREE.Group(); 
        carRig.add(carGroup);
        scene.add(carRig);
        
        const wireframeMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.2 });
        
        const mainBody = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.5, 2.2), wireframeMat);
        const cabin = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.2, 2, 4).rotateZ(Math.PI / 2), wireframeMat);
        cabin.position.set(-0.2, 0.8, 0);
        const spoiler = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 2.2), wireframeMat);
        spoiler.position.set(2, 0.8, 0);

        carGroup.add(mainBody, cabin, spoiler);

        const wheelGeo = new THREE.TorusGeometry(0.4, 0.15, 8, 16);
        const wheels = [];
        const baseWheelPositions = [[-1.5, -0.2, 1.2], [1.5, -0.2, 1.2], [-1.5, -0.2, -1.2], [1.5, -0.2, -1.2]];
        baseWheelPositions.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, wireframeMat);
            wheel.position.set(...pos);
            wheel.rotation.x = Math.PI / 2;
            carGroup.add(wheel);
            wheels.push(wheel);
        });

        const coreMat = new THREE.MeshBasicMaterial({ color: 0xff2a2a, transparent: true, opacity: 0.8 });
        const core = new THREE.Mesh(new THREE.BoxGeometry(2, 0.2, 1), coreMat);
        carGroup.add(core);

        // --- 4. GSAP ANIMATIONS & OVERLAP FIX ---
        gsap.registerPlugin(ScrollTrigger);

        // Intro Animations
        gsap.fromTo(".hero-zoom", { scale: 1.2, opacity: 0 }, { scale: 1, opacity: 1, duration: 1.5, ease: "power3.out", delay: 0.2 });
        gsap.fromTo(".hero-fade", { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 1, delay: 0.8, ease: "power2.out" });

        // Fade in Category Cards
        gsap.utils.toArray('.category-card').forEach(card => {
            gsap.to(card, {
                opacity: 1, y: 0, duration: 1, ease: "back.out(1)",
                scrollTrigger: { trigger: card, start: "top 85%" }
            });
        });

        // Progress Bar
        gsap.to("#progress-inner", {
            height: "100%", ease: "none",
            scrollTrigger: { trigger: document.body, start: "top top", end: "bottom bottom", scrub: 0.1 }
        });

        // The Master 3D Timeline
        const masterTl = gsap.timeline({
            scrollTrigger: {
                trigger: "#catalog",
                start: "top bottom",
                end: "bottom bottom",
                scrub: 1
            }
        });

        // Initial setup for hero exit
        carRig.position.set(0, 0, -10);
        carGroup.rotation.set(0.5, 0, 0);

        const step = 1 / categoriesData.length;

        // MATCHMEDIA: This fixes the overlap perfectly based on device size
        let mm = gsap.matchMedia();

        mm.add({
            // Desktop
            isDesktop: "(min-width: 1025px)",
            // Mobile/Tablet
            isMobile: "(max-width: 1024px)"
        }, (context) => {
            let { isDesktop, isMobile } = context.conditions;

            categoriesData.forEach((cat, i) => {
                const isEven = i % 2 === 0;
                
                // DYNAMIC X OFFSET:
                // Desktop: Push far left/right based on aspect ratio to avoid card.
                // Mobile: Keep strictly centered (0), card is pushed to bottom via CSS.
                const aspect = window.innerWidth / window.innerHeight;
                let targetX = 0;
                
                if (isDesktop) {
                    // Push to the opposite side of the text card.
                    // Multiplying by aspect ratio ensures ultra-wide monitors push it far enough.
                    const baseOffset = 3.5; 
                    targetX = isEven ? -(baseOffset * aspect) : (baseOffset * aspect);
                }

                // Dramatic rotation
                const targetRotY = isEven ? Math.PI * 0.8 : Math.PI * 1.2; 
                
                const segmentTl = gsap.timeline();

                // 1. Move & Spin
                segmentTl.to(carRig.position, { 
                    x: targetX, 
                    // On mobile, push the car slightly up on the Y axis to make room for text below
                    y: isMobile ? 2 : Math.sin(i) * 0.5, 
                    z: isMobile ? -2 : 3, // Keep slightly further back on mobile
                    ease: "power1.inOut" 
                }, 0);

                segmentTl.to(carGroup.rotation, { 
                    y: targetRotY + (i * Math.PI), 
                    x: 0.2,
                    ease: "power1.inOut" 
                }, 0);

                // 2. Morph Geometry
                segmentTl.to(mainBody.scale, { x: cat.geom.length, z: cat.geom.width, ease: "power2.inOut" }, 0);
                segmentTl.to(cabin.scale, { x: cat.geom.length, z: cat.geom.width, ease: "power2.inOut" }, 0);
                segmentTl.to(spoiler.scale, { x: cat.geom.width, ease: "power2.inOut" }, 0);
                segmentTl.to(spoiler.position, { y: cat.geom.spoilerY, x: 2 * cat.geom.length, ease: "power2.inOut" }, 0);
                
                wheels.forEach((w, wIdx) => {
                    const base = baseWheelPositions[wIdx];
                    segmentTl.to(w.scale, { x: cat.geom.wheelScale, y: cat.geom.wheelScale, z: cat.geom.wheelScale, ease: "power2.inOut" }, 0);
                    segmentTl.to(w.position, { x: base[0] * cat.geom.length, z: base[2] * cat.geom.width, ease: "power2.inOut" }, 0);
                });

                // 3. Morph Color
                segmentTl.to(coreMat.color, { 
                    r: new THREE.Color(cat.color).r, 
                    g: new THREE.Color(cat.color).g, 
                    b: new THREE.Color(cat.color).b, 
                    ease: "none" 
                }, 0);
                
                // Update Nav ID
                ScrollTrigger.create({
                    trigger: `#section-${cat.id}`,
                    start: "top center",
                    end: "bottom center",
                    onEnter: () => document.getElementById('active-id').innerText = `SERIES: ${cat.id}`,
                    onEnterBack: () => document.getElementById('active-id').innerText = `SERIES: ${cat.id}`
                });

                masterTl.add(segmentTl, i * step);
            });

            // Final zoom out on the footer
            masterTl.to(carRig.position, { z: -10, x: 0, y: 0, duration: step }, "-=0");
            masterTl.to(carGroup.rotation, { y: "+=3.14", x: 0.5, duration: step }, "-=" + step);

        });

        // --- 5. RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            
            carRig.position.y += Math.sin(time * 2) * 0.002;
            wheels.forEach(w => w.rotation.z -= 0.05);
            coreMat.opacity = 0.6 + Math.sin(time * 5) * 0.4;

            renderer.render(scene, camera);
        }
        animate();

        // --- 6. WINDOW RESIZE ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            // ScrollTrigger refresh is handled automatically by GSAP matchMedia
        });
    </script>
</body>
</html>
