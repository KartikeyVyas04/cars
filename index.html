<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR006 | Brand Lab Registry</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root {
            --bg-dark: #030000;
            --bg-red: #3a0005;
            --text: #f5f5f5;
            --accent: #ff2a2a;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text); 
            font-family: var(--sans); 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased; 
        }

        /* Red/Black Gradient Background */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, var(--bg-red) 0%, var(--bg-dark) 80%);
            z-index: 0;
        }

        /* Subtle noise texture for premium feel */
        .noise-overlay {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            z-index: 1;
            pointer-events: none;
        }

        #webgl-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 2rem 3rem;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            z-index: 100;
            font-family: var(--mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        nav .nav-center { text-align: center; color: var(--accent); font-weight: 600; }
        nav .nav-right { text-align: right; }

        /* Content Sections */
        .content {
            position: relative;
            z-index: 10;
        }

        section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 5vw;
        }

        .hero {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(4rem, 16vw, 16rem);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -0.06em;
            text-transform: uppercase;
            margin-top: 1rem;
        }

        .hero .outline-text {
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.8);
        }

        /* Grid Layout for Cars */
        .car-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Alternating Alignment */
        .car-section:nth-child(even) .car-info-wrapper {
            grid-column: 2;
        }
        .car-section:nth-child(odd) .car-info-wrapper {
            grid-column: 1;
        }

        .car-info {
            max-width: 500px;
            padding: 3rem;
            background: rgba(10, 0, 0, 0.4);
            border: 1px solid rgba(255, 42, 42, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 4px;
            transform-origin: center center;
        }

        .car-number {
            font-family: var(--mono);
            color: var(--accent);
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: block;
            letter-spacing: 0.1em;
        }

        .car-title {
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
        }

        .car-meta {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 1.5rem;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            font-family: var(--mono);
            font-size: 0.85rem;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-transform: uppercase;
            color: #aaa;
        }

        .meta-row span:last-child {
            color: var(--text);
            font-weight: 500;
        }

        .cta-footer {
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-top: 1px solid rgba(255, 42, 42, 0.2);
            background: radial-gradient(circle at top, rgba(58, 0, 5, 0.8) 0%, transparent 70%);
        }

        .buy-btn {
            background: var(--accent);
            color: white;
            padding: 1.2rem 3rem;
            text-decoration: none;
            font-family: var(--mono);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-block;
            margin-top: 2rem;
            border: 1px solid var(--accent);
        }

        .buy-btn:hover {
            background: transparent;
            color: var(--accent);
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 42, 42, 0.3);
        }

        /* Scroll Progress Indicator */
        #progress-bar {
            position: fixed;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            height: 300px;
            width: 1px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        #progress-inner {
            width: 3px;
            height: 0%;
            background: var(--accent);
            transform: translateX(-1px);
        }

        @media (max-width: 900px) {
            .car-section { grid-template-columns: 1fr !important; gap: 2rem; }
            .car-section:nth-child(even) .car-info-wrapper,
            .car-section:nth-child(odd) .car-info-wrapper { grid-column: 1; }
            nav { grid-template-columns: 1fr 1fr; padding: 1.5rem; }
            nav .nav-center { display: none; }
            .car-info { padding: 2rem; }
            #progress-bar { display: none; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <div class="noise-overlay"></div>
    <div id="webgl-container"></div>
    <div id="progress-bar"><div id="progress-inner"></div></div>

    <nav>
        <div>Brand Lab &copy; 2026</div>
        <div class="nav-center">SYSTEM: 001—010</div>
        <div class="nav-right" id="active-id">INIT SEQUENCE</div>
    </nav>

    <main class="content">
        <section class="hero">
            <div style="font-family: var(--mono); color: var(--accent); letter-spacing: 0.2em; font-size: 0.9rem;" class="hero-fade">CLASSIFIED REGISTRY</div>
            <h1 class="hero-zoom">
                SPEED<br>
                <span class="outline-text">DEMONS</span>
            </h1>
        </section>

        <div id="catalog"></div>

        <section class="cta-footer">
            <h2 class="hero-zoom" style="font-size: clamp(3rem, 8vw, 6rem); font-weight: 900; line-height: 1; text-transform: uppercase; letter-spacing: -0.04em;">ACQUIRE <br> THE FLEET</h2>
            <a href="#" class="buy-btn hero-fade">Access Portal</a>
        </section>
    </main>

    <script>
        // --- 1. DATA: THE 10 CARS ---
        const carData = [
            { id: "001", name: "Crimson-X", price: "$245", scale: "1:18", type: "Hypercar", parts: "342" },
            { id: "002", name: "Night-Fall", price: "$180", scale: "1:18", type: "Track Spec", parts: "298" },
            { id: "003", name: "Apex-R", price: "$320", scale: "1:12", type: "Prototype", parts: "510" },
            { id: "004", name: "Velocity-9", price: "$150", scale: "1:24", type: "Street", parts: "185" },
            { id: "005", name: "Blood-Line", price: "$290", scale: "1:18", type: "Hypercar", parts: "420" },
            { id: "006", name: "Iron-Lung", price: "$175", scale: "1:18", type: "Muscle", parts: "255" },
            { id: "007", name: "Zenith-V", price: "$410", scale: "1:12", type: "Concept", parts: "605" },
            { id: "008", name: "Pulse-Red", price: "$130", scale: "1:24", type: "Drift", parts: "192" },
            { id: "009", name: "Vortex-GT", price: "$260", scale: "1:18", type: "Endurance", parts: "318" },
            { id: "010", name: "Abyss-0", price: "$500", scale: "1:8", type: "Halo", parts: "890" }
        ];

        // --- 2. DYNAMIC UI INJECTION ---
        const catalog = document.getElementById('catalog');
        carData.forEach(car => {
            const section = document.createElement('section');
            section.className = 'car-section';
            section.id = `section-${car.id}`;
            section.innerHTML = `
                <div class="car-info-wrapper">
                    <div class="car-info">
                        <span class="car-number">MODEL // ${car.id}</span>
                        <h2 class="car-title">${car.name}</h2>
                        <div class="car-meta">
                            <div class="meta-row"><span>Unit Price</span><span>${car.price}</span></div>
                            <div class="meta-row"><span>Classification</span><span>${car.type}</span></div>
                            <div class="meta-row"><span>Technical Scale</span><span>${car.scale}</span></div>
                            <div class="meta-row"><span>Component Count</span><span>${car.parts}</span></div>
                        </div>
                    </div>
                </div>
            `;
            catalog.appendChild(section);
        });

        // --- 3. THREE.JS SCENE SETUP ---
        const scene = new THREE.Scene();
        // Adjust fog to match the red/black background
        scene.fog = new THREE.FogExp2(0x1a0000, 0.04);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        // Lighting
        const light = new THREE.PointLight(0xff2a2a, 2, 50);
        light.position.set(5, 5, 5);
        scene.add(light);
        
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);

        // Procedural Wireframe Car
        const carGroup = new THREE.Group();
        
        // Bright white/silver wireframe looks incredible against dark red
        const wireframeMat = new THREE.MeshBasicMaterial({ 
            color: 0xffffff, 
            wireframe: true, 
            transparent: true, 
            opacity: 0.15 
        });
        
        // Core Chassis
        const mainBody = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.5, 2.2), wireframeMat);
        // Cabin
        const cabinGeo = new THREE.CylinderGeometry(0.8, 1.2, 2, 4);
        cabinGeo.rotateZ(Math.PI / 2);
        const cabin = new THREE.Mesh(cabinGeo, wireframeMat);
        cabin.position.set(-0.2, 0.8, 0);
        // Spoiler
        const spoiler = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 2.2), wireframeMat);
        spoiler.position.set(2, 0.8, 0);

        carGroup.add(mainBody, cabin, spoiler);

        // Wheels
        const wheelGeo = new THREE.TorusGeometry(0.4, 0.15, 8, 16);
        const wheels = [];
        [[-1.5, -0.2, 1.2], [1.5, -0.2, 1.2], [-1.5, -0.2, -1.2], [1.5, -0.2, -1.2]].forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, wireframeMat);
            wheel.position.set(...pos);
            wheel.rotation.x = Math.PI / 2;
            carGroup.add(wheel);
            wheels.push(wheel);
        });

        // Add a glowing core inside the car
        const coreGeo = new THREE.BoxGeometry(2, 0.2, 1);
        const coreMat = new THREE.MeshBasicMaterial({ color: 0xff2a2a, transparent: true, opacity: 0.8 });
        const core = new THREE.Mesh(coreGeo, coreMat);
        carGroup.add(core);

        scene.add(carGroup);

        // --- 4. GSAP ANIMATIONS (ZOOMS & ALIGNMENT) ---
        gsap.registerPlugin(ScrollTrigger);

        // Hero Load Animation (Zoom out effect)
        gsap.fromTo(".hero-zoom", 
            { scale: 1.5, opacity: 0 }, 
            { scale: 1, opacity: 1, duration: 1.5, stagger: 0.2, ease: "expo.out" }
        );
        gsap.fromTo(".hero-fade", 
            { y: 30, opacity: 0 }, 
            { y: 0, opacity: 1, duration: 1, delay: 0.5, ease: "power2.out" }
        );

        // Hero scroll away (Zoom car in)
        gsap.to(carGroup.position, {
            z: 8, // Zoom towards camera
            rotationX: 0.5,
            scrollTrigger: { trigger: ".hero", start: "top top", end: "bottom top", scrub: 1 }
        });

        // Loop through each car section for dramatic zoom-in UI animations
        carData.forEach((car, i) => {
            const section = document.getElementById(`section-${car.id}`);
            const infoBox = section.querySelector('.car-info');
            const isEven = i % 2 === 0;

            // HTML Element Zoom In
            gsap.fromTo(infoBox,
                { scale: 0.8, opacity: 0, y: 100 },
                { 
                    scale: 1, 
                    opacity: 1, 
                    y: 0, 
                    duration: 1, 
                    ease: "back.out(1.2)",
                    scrollTrigger: {
                        trigger: section,
                        start: "top 75%",
                        end: "center center",
                        toggleActions: "play none none reverse"
                    }
                }
            );

            // 3D Car Zoom & Swoop Sync
            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: section,
                    start: "top bottom",
                    end: "bottom top",
                    scrub: 1.5,
                    onEnter: () => document.getElementById('active-id').innerText = `TARGET: ${car.id}`,
                    onEnterBack: () => document.getElementById('active-id').innerText = `TARGET: ${car.id}`
                }
            });

            // The car swoops from side to side and zooms in/out
            const targetX = isEven ? -4 : 4; // Move opposite of the UI box
            
            tl.fromTo(carGroup.position, 
                { z: -5 }, // Start zoomed out
                { x: targetX, z: 4, duration: 0.5, ease: "power1.inOut" } // Zoom in
            );
            tl.to(carGroup.position, { z: -5, duration: 0.5, ease: "power1.inOut" }); // Zoom back out as it leaves
            
            // Continuous rotation flip
            tl.to(carGroup.rotation, { y: carGroup.rotation.y + Math.PI, duration: 1 }, 0);
        });

        // Progress Bar Fill
        gsap.to("#progress-inner", {
            height: "100%",
            ease: "none",
            scrollTrigger: {
                trigger: document.body,
                start: "top top",
                end: "bottom bottom",
                scrub: 0.1
            }
        });

        // --- 5. RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Subtle idle floating
            const time = Date.now() * 0.001;
            carGroup.position.y = Math.sin(time) * 0.2;
            
            // Spin wheels
            wheels.forEach(w => w.rotation.y -= 0.02);

            // Pulse the red core
            core.material.opacity = 0.5 + Math.sin(time * 4) * 0.3;

            renderer.render(scene, camera);
        }
        animate();

        // --- 6. WINDOW RESIZE ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
