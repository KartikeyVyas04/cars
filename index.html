<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR006 | Brand Lab Interactive</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <!-- GSAP & Smooth Scroll (Lenis) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>

    <style>
        :root {
            --bg-dark: #050000;
            --bg-red: #3a0005;
            --text: #efefef;
            --accent: #ff2a2a;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none; /* Hide default cursor for custom cursor */
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: var(--sans);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- BACKGROUND --- */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, var(--bg-red) 0%, var(--bg-dark) 60%);
            z-index: -2;
        }

        .noise {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            z-index: -1;
            pointer-events: none;
        }

        /* --- CUSTOM CURSOR --- */
        .cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 12px;
            height: 12px;
            background-color: var(--text);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1), height 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform, width, height;
        }

        .cursor.active {
            width: 60px;
            height: 60px;
            background-color: var(--accent);
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 2rem 4vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            font-family: var(--mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            mix-blend-mode: difference;
        }

        /* --- HERO --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .hero h1 {
            font-size: clamp(3rem, 12vw, 12rem);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            will-change: transform;
        }

        .outline {
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.8);
        }

        /* --- CAR CATALOG (3D MOUSE INTERACTIONS) --- */
        .catalog {
            padding: 10vh 5vw;
            display: flex;
            flex-direction: column;
            gap: 15vh;
            max-width: 1600px;
            margin: 0 auto;
        }

        .car-card {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 4rem;
            align-items: center;
            perspective: 1500px; /* Essential for 3D effect */
        }

        .car-card:nth-child(even) {
            grid-template-columns: 1fr 1.2fr;
        }
        .car-card:nth-child(even) .card-image-wrapper {
            order: 2;
        }

        /* Image Wrapper & 3D Element */
        .card-image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/10;
            border-radius: 4px;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .card-image-inner {
            position: absolute;
            inset: 0;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            transform: translateZ(50px); /* Pushes image out towards user */
        }

        .card-image-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.1); /* Buffer for mouse movement */
            will-change: transform;
            transition: filter 0.5s ease;
            filter: grayscale(80%) brightness(0.8);
        }

        .car-card:hover .card-image-inner img {
            filter: grayscale(0%) brightness(1);
        }

        /* Typography inside cards */
        .card-info {
            transform: translateZ(30px);
        }

        .card-id {
            font-family: var(--mono);
            color: var(--accent);
            display: block;
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
            font-size: 0.9rem;
        }

        .card-title {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 800;
            text-transform: uppercase;
            line-height: 0.9;
            margin-bottom: 2rem;
            letter-spacing: -0.04em;
        }

        .card-meta {
            font-family: var(--mono);
            font-size: 0.85rem;
            color: #999;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 1.5rem;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            text-transform: uppercase;
        }

        .meta-row span:last-child {
            color: var(--text);
            font-weight: 500;
        }

        .btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 1rem 0;
            color: var(--text);
            font-family: var(--mono);
            text-transform: uppercase;
            text-decoration: none;
            border-bottom: 1px solid var(--accent);
            transition: color 0.3s ease;
        }

        .btn:hover {
            color: var(--accent);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .car-card, .car-card:nth-child(even) {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            .car-card:nth-child(even) .card-image-wrapper { order: 0; }
            nav { padding: 1.5rem; }
        }

        /* Touch devices: disable custom cursor */
        @media (hover: none) and (pointer: coarse) {
            * { cursor: auto !important; }
            .cursor { display: none; }
            .card-image-inner img { filter: grayscale(0%) brightness(1); }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <div class="noise"></div>
    
    <!-- Custom Cursor -->
    <div class="cursor" id="cursor"></div>

    <nav>
        <div>SR006 &copy; 2026</div>
        <div>Brand Lab Collection</div>
    </nav>

    <div class="content">
        <!-- Hero Section -->
        <section class="hero">
            <h1 id="hero-text">
                DIECAST<br>
                <span class="outline">LEGACY</span>
            </h1>
            <p style="font-family: var(--mono); margin-top: 2rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.1em;">Scroll to interact</p>
        </section>

        <!-- Dynamic Catalog Section -->
        <section class="catalog" id="catalog-container">
            <!-- Cards injected via JS -->
        </section>
    </div>

    <script>
        // --- 1. DATA: REAL IMAGES (Unsplash Placeholders) ---
        const carData = [
            { id: "001", name: "Apex-R Track", price: "$245", type: "Hypercar", img: "https://images.unsplash.com/photo-1614200187524-dc4b892acf16?q=80&w=1600&auto=format&fit=crop" },
            { id: "002", name: "Nightfall GT", price: "$180", type: "Endurance", img: "https://images.unsplash.com/photo-1603584173870-7f23fdae1b7a?q=80&w=1600&auto=format&fit=crop" },
            { id: "003", name: "Crimson V8", price: "$320", type: "Muscle Spec", img: "https://images.unsplash.com/photo-1583121274602-3e2820c69888?q=80&w=1600&auto=format&fit=crop" },
            { id: "004", name: "Halo Concept", price: "$450", type: "Prototype", img: "https://images.unsplash.com/photo-1544829099-b9a0c07fad1a?q=80&w=1600&auto=format&fit=crop" }
        ];

        // --- 2. GENERATE UI ---
        const catalog = document.getElementById('catalog-container');
        
        carData.forEach(car => {
            const cardHtml = `
                <div class="car-card">
                    <div class="card-image-wrapper interactive-card">
                        <div class="card-image-inner">
                            <img src="${car.img}" alt="${car.name}" loading="lazy">
                        </div>
                    </div>
                    <div class="card-info">
                        <span class="card-id">SERIES // ${car.id}</span>
                        <h2 class="card-title">${car.name}</h2>
                        <div class="card-meta">
                            <div class="meta-row"><span>Classification</span><span>${car.type}</span></div>
                            <div class="meta-row"><span>Unit Price</span><span>${car.price}</span></div>
                            <div class="meta-row"><span>Availability</span><span>In Stock</span></div>
                        </div>
                        <a href="#" class="btn hover-target">View Specifications</a>
                    </div>
                </div>
            `;
            catalog.insertAdjacentHTML('beforeend', cardHtml);
        });

        // --- 3. CUSTOM CURSOR LOGIC ---
        const cursor = document.getElementById('cursor');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let cursorX = mouseX;
        let cursorY = mouseY;

        // Track Mouse
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // Smooth Cursor Render Loop
        gsap.ticker.add(() => {
            // Lerp (Linear Interpolation) for smoothness
            cursorX += (mouseX - cursorX) * 0.2;
            cursorY += (mouseY - cursorY) * 0.2;
            gsap.set(cursor, { x: cursorX, y: cursorY });
        });

        // Expand cursor on interactive elements
        const hoverTargets = document.querySelectorAll('a, .hover-target, .interactive-card');
        hoverTargets.forEach(target => {
            target.addEventListener('mouseenter', () => cursor.classList.add('active'));
            target.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        });


        // --- 4. 3D MOUSE PARALLAX / TILT LOGIC ---
        const cards = document.querySelectorAll('.interactive-card');

        cards.forEach(card => {
            const inner = card.querySelector('.card-image-inner');
            const img = card.querySelector('img');

            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                
                // Calculate mouse position relative to the center of the card
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;

                // Calculate rotation (max 15 degrees)
                const rotateX = (y / (rect.height / 2)) * -15;
                const rotateY = (x / (rect.width / 2)) * 15;

                // Move image slightly inside the wrapper for deep parallax
                const moveX = (x / rect.width) * -20;
                const moveY = (y / rect.height) * -20;

                // Apply GSAP animation for buttery smooth tilt
                gsap.to(inner, {
                    rotateX: rotateX,
                    rotateY: rotateY,
                    duration: 0.5,
                    ease: "power2.out"
                });

                gsap.to(img, {
                    x: moveX,
                    y: moveY,
                    scale: 1.15,
                    duration: 0.5,
                    ease: "power2.out"
                });
            });

            // Reset on mouse leave
            card.addEventListener('mouseleave', () => {
                gsap.to(inner, { rotateX: 0, rotateY: 0, duration: 1, ease: "elastic.out(1, 0.3)" });
                gsap.to(img, { x: 0, y: 0, scale: 1.1, duration: 1, ease: "elastic.out(1, 0.3)" });
            });
        });

        // Hero Mouse Parallax (Moves the text slightly)
        const heroText = document.getElementById('hero-text');
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 40;
            const y = (e.clientY / window.innerHeight - 0.5) * 40;
            gsap.to(heroText, { x: x, y: y, duration: 1, ease: "power2.out" });
        });


        // --- 5. SMOOTH SCROLLING & SCROLL ANIMATIONS ---
        
        // Init Lenis Smooth Scroll
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), // standard easing
            direction: 'vertical',
            gestureDirection: 'vertical',
            smooth: true,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // Sync GSAP ScrollTrigger with Lenis
        gsap.registerPlugin(ScrollTrigger);
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => { lenis.raf(time * 1000); });
        gsap.ticker.lagSmoothing(0);

        // Scroll Enter Animations for Cards
        const carRows = document.querySelectorAll('.car-card');
        carRows.forEach(row => {
            gsap.fromTo(row, 
                { opacity: 0, y: 100 },
                {
                    opacity: 1,
                    y: 0,
                    duration: 1.2,
                    ease: "power3.out",
                    scrollTrigger: {
                        trigger: row,
                        start: "top 85%", // Triggers when top of card hits 85% down the viewport
                        toggleActions: "play none none reverse"
                    }
                }
            );
        });

        // Initial Hero Fade In
        gsap.fromTo(".hero h1", { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 1.5, ease: "power3.out" });

    </script>
</body>
</html>
